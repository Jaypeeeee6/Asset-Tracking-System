<!-- Confirm dialog (maa-inventory modal-confirm) -->
<div id="appConfirmModal" class="modal-confirm" role="dialog" aria-modal="true" aria-labelledby="appConfirmTitle" aria-describedby="appConfirmMessage" aria-hidden="true">
  <div class="modal-confirm-card">
    <h3 id="appConfirmTitle" class="modal-confirm-title">Confirm</h3>
    <p id="appConfirmMessage" class="modal-confirm-message"></p>
    <div class="modal-confirm-buttons">
      <button type="button" class="modal-confirm-btn modal-confirm-btn-cancel" id="appConfirmCancel">Cancel</button>
      <button type="button" class="modal-confirm-btn modal-confirm-btn-confirm modal-confirm-btn-approve" id="appConfirmOk">Confirm</button>
    </div>
  </div>
</div>

<!-- Alert dialog (errors, notices) -->
<div id="appAlertModal" class="modal-confirm" role="dialog" aria-modal="true" aria-labelledby="appAlertTitle" aria-describedby="appAlertMessage" aria-hidden="true">
  <div class="modal-confirm-card">
    <h3 id="appAlertTitle" class="modal-confirm-title">Notice</h3>
    <p id="appAlertMessage" class="modal-confirm-message"></p>
    <div class="modal-confirm-buttons">
      <button type="button" class="modal-confirm-btn modal-confirm-btn-confirm modal-confirm-btn-approve" id="appAlertOk">OK</button>
    </div>
  </div>
</div>
