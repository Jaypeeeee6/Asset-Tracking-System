{% set ep = request.endpoint %}
<nav id="sidebar-wrapper">
    <div class="sidebar-main">
        <div class="sidebar-heading">Menu</div>

        <a href="{{ url_for('assets.dashboard') }}"
           class="sidebar-item {{ 'active' if ep == 'assets.dashboard' }}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        {% if current_user.role == 'admin' %}
            <div class="sidebar-divider"></div>
            <a href="{{ url_for('auth.manage_users') }}"
               class="sidebar-item {{ 'active' if ep in ('auth.manage_users', 'auth.delete_auth_user') }}">
                <i class="bi bi-people"></i> Manage Users
            </a>
            <a href="{{ url_for('auth.add_auth_user') }}"
               class="sidebar-item {{ 'active' if ep == 'auth.add_auth_user' }}">
                <i class="bi bi-person-plus"></i> Add User
            </a>
            <div class="sidebar-divider"></div>
            <a href="{{ url_for('assets.dashboard') }}?openModal=buildingManagementModal" class="sidebar-item">
                <i class="bi bi-building"></i> Manage Buildings
            </a>
            <a href="{{ url_for('assets.dashboard') }}?openModal=departmentManagementModal" class="sidebar-item">
                <i class="bi bi-diagram-3"></i> Manage Departments
            </a>
            <a href="{{ url_for('assets.dashboard') }}?openModal=userManagementModal" class="sidebar-item">
                <i class="bi bi-person-badge"></i> Manage Employees
            </a>
            <a href="{{ url_for('assets.dashboard') }}?openModal=assetManagementModal" class="sidebar-item">
                <i class="bi bi-box-seam"></i> Manage Assets
            </a>
            <a href="{{ url_for('assets.archive') }}"
               class="sidebar-item {{ 'active' if ep == 'assets.archive' }}">
                <i class="bi bi-archive"></i> Asset Archive
            </a>
            <a href="{{ url_for('assets.dashboard') }}?openModal=priceAnalysisModal" class="sidebar-item">
                <i class="bi bi-currency-dollar"></i> View Price Analysis
            </a>
        {% endif %}
    </div>

    <div class="sidebar-bottom">
        <div class="sidebar-divider"></div>
        <a href="{{ url_for('auth.logout') }}" class="sidebar-item">
            <i class="bi bi-box-arrow-left"></i> Logout
        </a>
    </div>
</nav>
