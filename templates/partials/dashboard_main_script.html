let branchesData = [];
let brandsData = [];
let assetTypesData = [];
/** Must match ``routes.assets.OFFICE_BRANCH_LABEL`` and server admin responses. */

/** Must match ``models.database.RESTAURANT_DEFAULT_DEPARTMENT_NAME`` and server assets routes. */
const RESTAURANT_DEFAULT_DEPT_JS = 'Restaurant';

/** Department QR label code (restaurant: branch code; office: MAA-{department name}). */
function formatDepartmentDisplayCode(deptOrBranch, departmentName) {
    if (deptOrBranch && typeof deptOrBranch === 'object') {
        const dept = deptOrBranch;
        if (dept.branch_id == null || dept.branch_name === OFFICE_BRANCH_LABEL_JS) {
            return 'MAA-' + dept.name;
        }
        if (dept.branch_code && String(dept.branch_code).trim()) {
            return String(dept.branch_code).trim().toUpperCase();
        }
        return (dept.branch_name || '').replace(/\s+/g, '').toUpperCase();
    }
    const branch = deptOrBranch || '';
    const department = departmentName || '';
    if (branch === OFFICE_BRANCH_LABEL_JS) {
        return 'MAA-' + department;
    }
    const match = branchesData.find(function (b) { return b.name === branch; });
    if (match && match.branch_code && String(match.branch_code).trim()) {
        return String(match.branch_code).trim().toUpperCase();
    }
    return branch.replace(/\s+/g, '').toUpperCase();
}

let selectedAssets = [];

        selectEl.innerHTML = '<option value="">' + (placeholderText || 'Select department') + '</option>';

            .then(function (response) { return response.json(); })
            .then(function (depts) {

                    option.value = department.name;

    function resolveDepartmentIdForOwnerLookup(departmentName, branchNameForMatch) {
        if (!departmentName) return null;
        const v = getAddAssetVenue();
        if (v === 'office') {
            const d = departmentsData.find(function (x) {
                return x.name === departmentName && (x.branch_id == null || x.branch_name === OFFICE_BRANCH_LABEL_JS);
            });
            return d ? d.id : null;
        }
        const bid = (branchesData.find(function (b) { return b.name === branchNameForMatch; }) || {}).id;
        const d2 = departmentsData.find(function (x) {
            return x.name === departmentName && x.branch_id === bid;
        });
        return d2 ? d2.id : null;
    }

    function loadBrands() {

            .then(data => {

                window.AssetAppState.brands = data;
                updateBrandsList();
                updateNewBranchBrandSelect();
                populateAddAssetBrandSelect();
                populateEditAssetBrandSelect();
                populateEmployeeBrandSelects();
                if (typeof populateEmployeeFilterSelects === 'function') populateEmployeeFilterSelects();
            })
            .catch(error => {
                console.error('Error loading brands:', error);
                alert('Failed to load brands. Please refresh the page.');
                return Promise.reject(error);
            });
    }

    function updateNewBranchBrandSelect() {
        const sel = document.getElementById('newBranchBrand');
        if (!sel) return;
        const prev = sel.value;
        sel.innerHTML = '<option value="">Select brand</option>';
        const sorted = [...brandsData].sort((a, b) => a.name.localeCompare(b.name));
        sorted.forEach(brand => {
            const option = document.createElement('option');
            option.value = String(brand.id);
            option.textContent = brand.name;
            sel.appendChild(option);
        });
        if (prev && Array.prototype.some.call(sel.options, function (opt) { return opt.value === prev; })) {
            sel.value = prev;
        }
    }

    function _fillBrandSelect(sel) {
        if (!sel) return;
        var prev = sel.value;
        sel.innerHTML = '<option value="">Select brand</option>';
        var sorted = [...brandsData].sort(function (a, b) { return a.name.localeCompare(b.name); });
        sorted.forEach(function (brand) {
            var option = document.createElement('option');
            option.value = String(brand.id);
            option.textContent = brand.name;
            sel.appendChild(option);
        });
        if (prev && Array.prototype.some.call(sel.options, function (opt) { return opt.value === prev; })) {
            sel.value = prev;
        }
    }

        const name = (building && building.name || '').trim();
        const code = (building && building.branch_code || '').trim();
        if (code && name) return code + ' ' + name;
        return name || code;

    function empChecklistEscape(str) {
        return String(str == null ? '' : str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function empRenderBranchChecklist(containerId, checkedIds) {
        var container = document.getElementById(containerId);
        if (!container) return;
        var checked = {};
        (checkedIds || []).forEach(function (id) { checked[String(id)] = true; });
        var list = (branchesData || []).slice();
        if (!list.length) {
            container.innerHTML = '<div class="app-branch-checklist-empty">No branches available. Add branches first.</div>';
            return;
        }
        var byBrand = {};
        list.forEach(function (b) {
            var brand = b.brand_name || 'Unassigned';
            (byBrand[brand] = byBrand[brand] || []).push(b);
        });
        var html = '';
        Object.keys(byBrand).sort().forEach(function (brand) {
            html += '<div class="branch-brand-group">';
            html += '<div class="branch-brand-title">' + empChecklistEscape(brand) + '</div>';
            byBrand[brand].sort(function (a, b) { return (a.name || '').localeCompare(b.name || ''); }).forEach(function (b) {
                var label = (b.branch_code ? b.branch_code + ' ' : '') + (b.name || '');
                var cid = containerId + '_b' + b.id;
                html += '<div class="form-check">'
                    + '<input class="form-check-input emp-branch-check" type="checkbox" value="' + b.id + '" id="' + cid + '"' + (checked[String(b.id)] ? ' checked' : '') + '>'
                    + '<label class="form-check-label" for="' + cid + '">' + empChecklistEscape(label) + '</label>'
                    + '</div>';
            });
            html += '</div>';
        });
        container.innerHTML = html;
    }

    function empGetCheckedBranchIds(containerId) {
        var container = document.getElementById(containerId);
        if (!container) return [];
        return Array.prototype.slice.call(container.querySelectorAll('.emp-branch-check:checked'))
            .map(function (cb) { return parseInt(cb.value, 10); })
            .filter(function (n) { return !isNaN(n); });
    }

    function empFilterBranchChecklist(containerId, term) {
        var container = document.getElementById(containerId);
        if (!container) return;
        term = (term || '').trim().toLowerCase();
        Array.prototype.forEach.call(container.querySelectorAll('.branch-brand-group'), function (grp) {
            var any = false;
            Array.prototype.forEach.call(grp.querySelectorAll('.form-check'), function (fc) {
                var label = fc.querySelector('label');
                var txt = label ? label.textContent.toLowerCase() : '';
                var show = !term || txt.indexOf(term) !== -1;
                fc.style.display = show ? '' : 'none';
                if (show) any = true;
            });
            grp.style.display = any ? '' : 'none';
        });
    }

    window.EmployeeBranchChecklist = {
        render: empRenderBranchChecklist,
        getChecked: empGetCheckedBranchIds,
        filter: empFilterBranchChecklist
    };

    // Update branch dropdown options (add-asset modal; restaurant uses brand filter)
    function updateBranchDropdown() {
        const buildingSelect = document.getElementById('branch');
        if (!buildingSelect) return;
        if (getAddAssetVenue() === 'restaurant') {
            const bsel = document.getElementById('add_asset_brand');
            updateAddAssetRestaurantBranchDropdown(bsel && bsel.value ? bsel.value : '');
            return;
        }
        buildingSelect.innerHTML = '<option value="">Select Branch</option>';
        branchesData.forEach(building => {
            const option = document.createElement('option');
            option.value = building.name;
            option.textContent = building.name;
            buildingSelect.appendChild(option);
        });
    }

    // Update department branch dropdown in management modal
    function updateDepartmentBranchDropdown() {
        const select = document.getElementById('newDepartmentBranch');
        if (!select) return;
        select.innerHTML = '<option value="">Select Branch</option>';
        branchesData.forEach(building => {
            const option = document.createElement('option');
            option.value = building.id;
            option.textContent = building.name;
            select.appendChild(option);
        });
    }

    // Update branches list in management modal
    function updateBranchesList() {
        const branchesList = document.getElementById('branchesList');
        if (!branchesList) return;
        branchesList.innerHTML = '';
        resetMgmtTableBulkUI('selectAllBranchesCheckbox', 'bulkDeleteBranchesBtn', 'branchesList', 'branch-row-checkbox');

        const sorted = [...branchesData].sort((a, b) => a.name.localeCompare(b.name));
        if (sorted.length === 0) {
            branchesList.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No branches yet. Add one above.</td></tr>';
            return;
        }

        sorted.forEach((building, i) => {
            const codeLabel = (building.branch_code && String(building.branch_code).trim())
                ? String(building.branch_code).trim()
                : '-';
            const brandLabel = building.brand_name ? building.brand_name : '—';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="checkbox" class="branch-row-checkbox" value="${building.id}" aria-label="Select ${building.name}"></td>
                <td>${i + 1}</td>
                <td>${codeLabel}</td>
                <td><strong class="branch-name" data-id="${building.id}">${building.name}</strong></td>
                <td>${brandLabel}</td>
                <td>
                    <div class="d-flex gap-2 flex-wrap align-items-center">
                        <button type="button" class="btn-app-edit-icon edit-branch-btn" data-id="${building.id}" data-name="${building.name}" title="Edit branch" aria-label="Edit branch">
                            <i class="bi bi-pencil-square" aria-hidden="true"></i>
                        </button>
                        <button type="button" class="btn-app-edit-icon btn-app-danger-icon delete-branch-btn" data-id="${building.id}" data-name="${building.name}" title="Delete branch" aria-label="Delete branch">
                            <i class="bi bi-trash" aria-hidden="true"></i>
                        </button>
                    </div>
                </td>
            `;
            branchesList.appendChild(tr);
        });

        document.querySelectorAll('.edit-branch-btn').forEach(btn => {
            btn.addEventListener('click', handleEditBranch);
        });
        document.querySelectorAll('.delete-branch-btn').forEach(btn => {
            btn.addEventListener('click', handleDeleteBranch);
        });
        resetMgmtTableBulkUI('selectAllBranchesCheckbox', 'bulkDeleteBranchesBtn', 'branchesList', 'branch-row-checkbox');
    }

    function isOfficeDepartment(dept) {
        return dept.branch_id == null || dept.branch_name === OFFICE_BRANCH_LABEL_JS;
    }

    // Update departments list in management modal (office departments only; restaurant branches live in Branches)
    function updateDepartmentsList() {
        const departmentsList = document.getElementById('departmentsList');
        if (!departmentsList) return;

        departmentsList.innerHTML = '';
        resetMgmtTableBulkUI('selectAllDepartmentsCheckbox', 'bulkDeleteDepartmentsBtn', 'departmentsList', 'department-row-checkbox');

        const filteredDepartments = departmentsData.filter(isOfficeDepartment);

        if (filteredDepartments.length === 0) {
            departmentsList.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No departments found</td></tr>';
            return;
        }

        const sorted = [...filteredDepartments].sort((a, b) => a.name.localeCompare(b.name));

        sorted.forEach((department, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="checkbox" class="department-row-checkbox" value="${department.id}" aria-label="Select ${department.name}"></td>
                <td>${i + 1}</td>
                <td><strong class="department-name" data-id="${department.id}">${department.name}</strong></td>
                <td>
                    <div class="d-flex gap-2 flex-wrap align-items-center">
                        <button type="button" class="btn-app-edit-icon edit-department-btn"
                                data-id="${department.id}"
                                data-name="${department.name}"
                                data-branch="${department.branch_name}"
                                title="Edit department" aria-label="Edit department">
                            <i class="bi bi-pencil-square" aria-hidden="true"></i>
                        </button>
                        <button type="button" class="btn-app-edit-icon btn-app-danger-icon delete-department-btn"
                                data-id="${department.id}"
                                data-name="${department.name}"
                                data-branch="${department.branch_name}"
                                title="Delete department" aria-label="Delete department">
                            <i class="bi bi-trash" aria-hidden="true"></i>
                        </button>
                    </div>
                </td>
            `;
            departmentsList.appendChild(tr);
        });

        document.querySelectorAll('.edit-department-btn').forEach(btn => {
            btn.addEventListener('click', handleEditDepartment);
        });
        document.querySelectorAll('.delete-department-btn').forEach(btn => {
            btn.addEventListener('click', handleDeleteDepartment);
        });
        resetMgmtTableBulkUI('selectAllDepartmentsCheckbox', 'bulkDeleteDepartmentsBtn', 'departmentsList', 'department-row-checkbox');
    }

    // Update department QR codes list
    function updateDepartmentQRList() {
        const qrList = document.getElementById('departmentQRList');
        if (!qrList) return;
        qrList.innerHTML = '';
        
        if (departmentsData.length === 0) {
            qrList.innerHTML = '<div class="col-12 text-center text-muted">No departments found</div>';
            return;
        }
        
        departmentsData.forEach(department => {
            const colDiv = document.createElement('div');
            colDiv.className = 'col-md-6 col-lg-4 mb-4';
            colDiv.innerHTML = `
                <div class="card h-100">
                    <div class="card-body text-center">
                        <h6 class="card-title text-primary">${formatDepartmentDisplayCode(department)}</h6>
                        <p class="card-text text-muted small">${department.branch_name} - ${department.name}</p>
                        <div class="mb-3">
                            <img src="/assets/department_qr/${encodeURIComponent(department.branch_name)}/${encodeURIComponent(department.name)}"

    // Handle importing branches & brands from an Excel file
    (function bindBranchImport() {
        const importBtn = document.getElementById('importBranchesBtn');
        const fileInput = document.getElementById('importBranchesFile');
        if (!importBtn || !fileInput) return;

        function norm(v) { return (v === null || v === undefined) ? '' : String(v).trim(); }

        function findHeader(aoa) {
            for (let i = 0; i < aoa.length; i++) {
                const lowered = (aoa[i] || []).map(function (c) { return norm(c).toLowerCase(); });
                if (lowered.indexOf('code') !== -1 && (lowered.indexOf('brand') !== -1 || lowered.indexOf('type') !== -1)) {
                    return { idx: i, header: lowered };
                }
            }
            return null;
        }

        function colIndex(header, candidates) {
            for (let i = 0; i < candidates.length; i++) {
                const idx = header.indexOf(candidates[i]);
                if (idx !== -1) return idx;
            }
            return -1;
        }

        // Prefer the sheet that includes a Branch Manager column so we can import managers.
        function parseWorkbook(wb) {
            let best = null;
            (wb.SheetNames || []).forEach(function (sn) {
                const ws = wb.Sheets[sn];
                if (!ws) return;
                const aoa = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false });
                const found = findHeader(aoa);
                if (!found) return;
                const hasManager = found.header.indexOf('branch manager') !== -1 || found.header.indexOf('manager') !== -1;
                if (!best || (hasManager && !best.hasManager)) best = { aoa: aoa, found: found, hasManager: hasManager };
            });
            if (!best) return [];
            const h = best.found.header;
            const ci = {
                code: colIndex(h, ['code']),
                name: colIndex(h, ['branch / flat name', 'branch/flat name', 'branch name', 'name']),
                type: colIndex(h, ['type']),
                brand: colIndex(h, ['brand']),
                manager: colIndex(h, ['branch manager', 'manager']),
                email: colIndex(h, ['email'])
            };
            const rows = [];
            for (let i = best.found.idx + 1; i < best.aoa.length; i++) {
                const r = best.aoa[i] || [];
                const type = ci.type !== -1 ? norm(r[ci.type]).toLowerCase() : 'branch';
                if (type && type !== 'branch') continue; // only restaurant branches
                const name = ci.name !== -1 ? norm(r[ci.name]) : '';
                if (!name) continue;
                rows.push({
                    code: ci.code !== -1 ? norm(r[ci.code]) : '',
                    name: name,
                    brand: ci.brand !== -1 ? norm(r[ci.brand]) : '',
                    manager: ci.manager !== -1 ? norm(r[ci.manager]) : '',
                    email: ci.email !== -1 ? norm(r[ci.email]) : ''
                });
            }
            return rows;
        }

        function sendImport(rows) {
            importBtn.disabled = true;
            fetch('/admin/import-branches', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rows: rows })
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (!data || data.error) {
                    alert((data && data.error) || 'Import failed.');
                    return;
                }
                const parts = [
                    'Brands added: ' + (data.brands_created || 0),
                    'Branches added: ' + (data.branches_created || 0) + (data.branches_skipped ? ' (' + data.branches_skipped + ' already existed)' : ''),
                    'Branch managers added: ' + (data.employees_created || 0) + (data.employees_skipped ? ' (' + data.employees_skipped + ' already existed)' : '')
                ];
                const msg = parts.join('\n');
                const refresh = function () {
                    if (typeof loadBrands === 'function' && typeof loadBranches === 'function') {
                        loadBrands().then(function () { return loadBranches(); }).catch(function () {});
                    } else if (typeof loadBranches === 'function') {
                        loadBranches();
                    }
                };
                refresh();
                if (window.AppDialogs && AppDialogs.success) {
                    AppDialogs.success(msg, 'Import complete');
                } else {
                    alert(msg);
                }
            })
            .catch(function (err) {
                console.error('Import error:', err);
                alert('Import failed. Please try again.');
            })
            .finally(function () { importBtn.disabled = false; });
        }

        importBtn.addEventListener('click', function () {
            if (typeof XLSX === 'undefined') {
                alert('The spreadsheet library did not load. Please refresh the page and try again.');
                return;
            }
            fileInput.value = '';
            fileInput.click();
        });

        fileInput.addEventListener('change', function () {
            const file = fileInput.files && fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                let rows;
                try {
                    const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    rows = parseWorkbook(wb);
                } catch (err) {
                    console.error('Parse error:', err);
                    alert('Could not read the Excel file. Please check that it matches the expected format.');
                    return;
                }
                if (!rows.length) {
                    alert('No branch rows were found in the file. Make sure it has "Code", "Type", and "Brand" columns with Type = "Branch".');
                    return;
                }
                const doIt = function () { sendImport(rows); };
                if (window.AppDialogs && AppDialogs.confirm) {
                    AppDialogs.confirm({
                        title: 'Import branches & brands',
                        message: 'Found ' + rows.length + ' branch row(s) in "' + file.name + '".\n\nThis will create any new brands, branches, and branch managers. Existing entries are kept.',
                        confirmText: 'Import'
                    }).then(function (ok) { if (ok) doIt(); });
                } else if (confirm('Import ' + rows.length + ' branch row(s)?')) {
                    doIt();
                }
            };
            reader.readAsArrayBuffer(file);
        });
    })();

    /**

    function assetTypeMatchesVenue(forVenue, venue) {
        const fv = forVenue || 'restaurant';
        if (fv === 'both') return venue === 'restaurant' || venue === 'office';
        return fv === venue;
    }

    function assetTypeLocationLabel(assetType) {
        if (!assetType) return '';
        const fv = assetType.for_venue || 'restaurant';
        if (fv === 'both') return 'All restaurants & All office departments';
        if (fv === 'office') return 'All office departments';
        return 'All restaurants';
    }

    function updateAssetNameDropdowns() {

    // Update asset name datalist based on selected asset type
    function updateAssetNameDropdown(assetTypeName, inputId) {
        const input = document.getElementById(inputId);
        const datalistId = inputId === 'name' ? 'assetNameList' : 'editAssetNameList';
        const datalist = document.getElementById(datalistId);
        
        if (!input || !datalist) return;
        
        // Clear existing options
        datalist.innerHTML = '';
        
        if (!assetTypeName || !window.assetNamesByType || !window.assetNamesByType[assetTypeName]) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'No asset names available for this type';
            datalist.appendChild(option);
            return;
        }
        
        // Add all asset names for the selected type
        window.assetNamesByType[assetTypeName].forEach(assetName => {
            const option = document.createElement('option');
            option.value = assetName.name;
            option.textContent = assetName.name;
            datalist.appendChild(option);
        });
        
        // Set initial placeholder
        const totalOptions = window.assetNamesByType[assetTypeName].length;
        input.placeholder = `Type to search predefined names (${totalOptions} available)`;
        
        // Add event listener for real-time filtering
        input.addEventListener('input', function() {
            filterAssetNameOptions(assetTypeName, inputId);
        });
        
        // Add event listener for selection (only for add asset form)
        if (inputId === 'name') {
            input.addEventListener('change', function() {
                const selectedValue = this.value.trim();
                if (selectedValue && validateAssetName(assetTypeName, selectedValue)) {
                    addAssetNameToSelection(selectedValue);
                    this.value = '';
                }
            });
        }
    }

    // Filter asset name options based on user input
    function filterAssetNameOptions(assetTypeName, inputId) {
        const input = document.getElementById(inputId);
        const datalistId = inputId === 'name' ? 'assetNameList' : 'editAssetNameList';
        const datalist = document.getElementById(datalistId);
        
        if (!input || !datalist || !window.assetNamesByType || !window.assetNamesByType[assetTypeName]) {
            return;
        }
        
        const userInput = input.value.toLowerCase().trim();
        
        // Clear existing options
        datalist.innerHTML = '';
        
        if (!userInput) {
            // If no input, show all asset names for the type
            window.assetNamesByType[assetTypeName].forEach(assetName => {
                const option = document.createElement('option');
                option.value = assetName.name;
                option.textContent = assetName.name;
                datalist.appendChild(option);
            });
            return;
        }
        
        // Filter asset names that start with the user input
        const filteredNames = window.assetNamesByType[assetTypeName].filter(assetName => 
            assetName.name.toLowerCase().startsWith(userInput)
        );
        
        // Add filtered options
        filteredNames.forEach(assetName => {
            const option = document.createElement('option');
            option.value = assetName.name;
            option.textContent = assetName.name;
            datalist.appendChild(option);
        });
        
        // If no matches found, show a message
        if (filteredNames.length === 0) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'No matching asset names found';
            datalist.appendChild(option);
        }
        
        // Update placeholder to show available options
        const totalOptions = window.assetNamesByType[assetTypeName].length;
        const availableOptions = filteredNames.length;
        if (userInput) {
            input.placeholder = `Found ${availableOptions} of ${totalOptions} asset names (type to filter)`;
        } else {
            input.placeholder = `Type to search predefined names (${totalOptions} available)`;
        }
    }

    // Validate asset name exists in predefined list
    function validateAssetName(assetTypeName, assetName) {
        if (!assetTypeName || !assetName || !window.assetNamesByType || !window.assetNamesByType[assetTypeName]) {
            return false;
        }
        
        const validNames = window.assetNamesByType[assetTypeName].map(item => item.name);
        return validNames.includes(assetName);
    }

    // Multi-select asset names functionality
    let selectedAssetNames = [];

    // Add asset name to selected list
    function addAssetNameToSelection(assetName) {
        if (!selectedAssetNames.includes(assetName)) {
            selectedAssetNames.push(assetName);
            updateSelectedAssetNamesDisplay();
            updateHiddenInput();
            renderAddAssetSpecFields();
        }
    }

    // Remove asset name from selected list
    function removeAssetNameFromSelection(assetName) {
        const index = selectedAssetNames.indexOf(assetName);
        if (index > -1) {
            selectedAssetNames.splice(index, 1);
            updateSelectedAssetNamesDisplay();
            updateHiddenInput();
            renderAddAssetSpecFields();
        }
    }

    // Update the display of selected asset names
    function updateSelectedAssetNamesDisplay() {
        const container = document.getElementById('selectedAssetNames');
        if (!container) return;
        
        container.innerHTML = '';
        
        selectedAssetNames.forEach(assetName => {
            const tag = document.createElement('div');
            tag.className = 'asset-name-tag';
            tag.innerHTML = `

    // Update hidden input with selected asset names

        const hiddenInput = document.getElementById('selectedAssetNamesInput');
        if (hiddenInput) {

    // Handle department change to update owner dropdown (add-asset form only)
    (function bindAddAssetDepartmentListeners() {
        const departmentEl = document.getElementById('department');
        const noOwnerCheckEl = document.getElementById('noOwnerCheck');
        const ownerSelectEl = document.getElementById('owner');
        if (!departmentEl || !noOwnerCheckEl || !ownerSelectEl) return;

        });

        noOwnerCheckEl.addEventListener('change', function() {
            if (noOwnerCheckEl.checked) {
                ownerSelectEl.disabled = true;
                ownerSelectEl.value = '';
                ownerSelectEl.style.opacity = '0.6';
                ownerSelectEl.style.backgroundColor = '#f8f9fa';
                ownerSelectEl.removeAttribute('required');
            } else {
                ownerSelectEl.disabled = false;
                ownerSelectEl.style.opacity = '1';
                ownerSelectEl.style.backgroundColor = '';
                ownerSelectEl.setAttribute('required', 'required');
                loadOwnersForDepartment(departmentEl.value);

    // Function to check if department should have no owner option
    function checkNoOwnerOption() {
        const departmentSelect = document.getElementById('department');
        const noOwnerCheck = document.getElementById('noOwnerCheck');
        const ownerSelect = document.getElementById('owner');
        if (!departmentSelect || !noOwnerCheck || !ownerSelect) return;
        
        const selectedDepartment = departmentSelect.value;
        
        if (selectedDepartment) {
            // Show the checkbox and enable it for all departments
            noOwnerCheck.parentElement.style.display = 'block';
            noOwnerCheck.disabled = false;
            
            // If checkbox is checked, keep owner disabled
            if (noOwnerCheck.checked) {
                ownerSelect.disabled = true;
                ownerSelect.style.opacity = '0.6';
                ownerSelect.style.backgroundColor = '#f8f9fa';
            }
        } else {
            // Hide the checkbox when no department is selected
            noOwnerCheck.parentElement.style.display = 'none';
            noOwnerCheck.checked = false;
            ownerSelect.disabled = false;
            ownerSelect.style.opacity = '1';
            ownerSelect.style.backgroundColor = '';
        }
    }

    /**
     * Display label for employee owner dropdown options (add-asset modal).
     * Stored asset owner value remains the employee name.
     */
    function formatEmployeeOwnerLabel(user) {
        const name = (user && user.name || '').trim();
        const employeeId = (user && user.employee_id || '').trim();
        if (employeeId && name) return employeeId + ' — ' + name;
        return name || employeeId;
    }

    /**
     * Dynamically load owners for a selected department
     * Updates the owner dropdown based on department selection
     * @param {string} departmentName - The selected department name
     */
    function loadOwnersForDepartment(departmentName) {
        const ownerSelect = document.getElementById('owner');
        if (!ownerSelect) return;

        // Clear existing options
        ownerSelect.innerHTML = '<option value="">Loading...</option>';
        
        if (!departmentName) {
            ownerSelect.innerHTML = '<option value="">Select department first</option>';
            return;
        }
        
        // Resolve department id (restaurant vs office) then load users
        const branchName = (document.getElementById('branch') && document.getElementById('branch').value) || '';
        const deptId = resolveDepartmentIdForOwnerLookup(departmentName, branchName);
        if (!deptId) {
            ownerSelect.innerHTML = '<option value="">Department not found</option>';
            return;
        }

        fetch('/admin/users?department_id=' + encodeURIComponent(deptId))
            .then(response => response.json())
            .then(users => {
                ownerSelect.innerHTML = '<option value="">Select Owner</option>';
                
                if (users.length === 0) {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = 'No users in this department';
                    option.disabled = true;
                    ownerSelect.appendChild(option);
                } else {
                    users.sort(function (a, b) {
                        const byId = (a.employee_id || '').localeCompare(b.employee_id || '');
                        if (byId !== 0) return byId;
                        return (a.name || '').localeCompare(b.name || '');
                    }).forEach(function (user) {
                        const option = document.createElement('option');
                        option.value = user.name;
                        option.textContent = formatEmployeeOwnerLabel(user);
                        ownerSelect.appendChild(option);
                    });
                }
            })
            .catch(error => {
                console.error('Error loading owners:', error);
                ownerSelect.innerHTML = '<option value="">Error loading owners</option>';
            });
    }

    function syncBulkEmployeeRegisterVenue() {
        const venueEl = document.getElementById('bulkEmployeeVenue');
        const bwrap = document.getElementById('bulkEmployeeBrandWrap');
        const wrap = document.getElementById('bulkEmployeeBranchWrap');
        const dwrap = document.getElementById('bulkEmployeeDepartmentWrap');
        const dept = document.getElementById('bulkUserModalDepartment');
        const branch = document.getElementById('bulkUserModalBranch');
        const brand = document.getElementById('bulkUserModalBrand');
        if (!venueEl || !dept) return;
        const val = venueEl.value;
        if (val === 'office') {
            if (bwrap) bwrap.classList.add('d-none');
            if (wrap) wrap.classList.add('d-none');
            if (dwrap) dwrap.classList.remove('d-none');
            if (brand) brand.value = '';
            if (branch) branch.value = '';
            dept.innerHTML = '<option value="">Loading...</option>';
            fetch('/admin/departments?office_only=1')
                .then(function (r) { return r.json(); })
                .then(function (depts) {
                    dept.innerHTML = '<option value="">Select department</option>';
                    depts.forEach(function (d) {
                        const option = document.createElement('option');
                        option.value = d.id;
                        option.textContent = d.name;
                        dept.appendChild(option);
                    });
                })
                .catch(function () {
                    dept.innerHTML = '<option value="">Error loading departments</option>';
                });
        } else if (val === 'restaurant') {
            if (bwrap) bwrap.classList.remove('d-none');
            if (wrap) wrap.classList.remove('d-none');
            if (dwrap) dwrap.classList.add('d-none');
            populateEmployeeBrandSelects();
            if (brand) brand.value = '';
            if (branch) branch.innerHTML = '<option value="">Select branch</option>';
            dept.innerHTML = '<option value="">Select branch first</option>';
        } else {
            if (bwrap) bwrap.classList.add('d-none');
            if (wrap) wrap.classList.add('d-none');
            if (dwrap) dwrap.classList.remove('d-none');
            if (brand) brand.value = '';
            if (branch) branch.innerHTML = '<option value="">Select branch</option>';
            dept.innerHTML = '<option value="">Choose location first</option>';
        }
    }

    // Load users for user modal
    function loadUserModalUsers(filterDepartmentId = '') {
        fetch('/admin/users?grouped=1')
            .then(response => response.json())
            .then(users => {
                const sorted = [...users].sort((a, b) => {
                    const byBranch = (a.branch_name || '').localeCompare(b.branch_name || '');
                    if (byBranch !== 0) return byBranch;
                    const byDept = (a.department_name || '').localeCompare(b.department_name || '');
                    if (byDept !== 0) return byDept;
                    return (a.name || '').localeCompare(b.name || '');
                });
                window.__employeeRosterAll = sorted;
                if (filterDepartmentId) {
                    const sel = document.getElementById('userModalFilterDepartment');
                    if (sel) sel.value = String(filterDepartmentId);

                applyEmployeeRosterFilters();

            .catch(error => {

    function applyEmployeeRosterFilters() {
        const all = window.__employeeRosterAll || [];
        const brandId = (document.getElementById('employeeFilterBrand') || {}).value || '';
        const branchId = (document.getElementById('employeeFilterBranch') || {}).value || '';
        const deptId = (document.getElementById('userModalFilterDepartment') || {}).value || '';

        const branchBrand = {};
        (branchesData || []).forEach(b => { branchBrand[String(b.id)] = String(b.brand_id); });

        const filtered = all.filter(emp => {
            if (deptId && (emp.department_ids || []).map(String).indexOf(deptId) === -1) return false;
            if (branchId && (emp.branch_ids || []).map(String).indexOf(branchId) === -1) return false;
            if (brandId) {
                const match = (emp.branch_ids || []).some(bid => branchBrand[String(bid)] === brandId);
                if (!match) return false;
            }
            return true;
        });
        renderEmployeeRosterRows(filtered);
    }

    function populateEmployeeBranchFilter(brandId) {
        const branchSel = document.getElementById('employeeFilterBranch');
        if (!branchSel) return;
        const prev = branchSel.value;
        branchSel.innerHTML = '<option value="">All branches</option>';
        let list = [...(branchesData || [])];
        if (brandId) list = list.filter(b => String(b.brand_id) === String(brandId));
        const byBrand = {};
        list.forEach(b => { const k = b.brand_name || 'Unassigned'; (byBrand[k] = byBrand[k] || []).push(b); });
        Object.keys(byBrand).sort().forEach(brand => {
            const grp = document.createElement('optgroup');
            grp.label = brand;
            byBrand[brand].sort((a, b) => (a.name || '').localeCompare(b.name || '')).forEach(b => {
                const o = document.createElement('option');
                o.value = String(b.id);
                o.textContent = (b.branch_code ? b.branch_code + ' ' : '') + (b.name || '');
                grp.appendChild(o);
            });
            branchSel.appendChild(grp);
        });
        if (prev && Array.prototype.some.call(branchSel.options, o => o.value === prev)) branchSel.value = prev;
    }

    function populateEmployeeFilterSelects() {
        const brandSel = document.getElementById('employeeFilterBrand');
        if (brandSel) {
            const prev = brandSel.value;
            brandSel.innerHTML = '<option value="">All brands</option>';
            [...(brandsData || [])].sort((a, b) => (a.name || '').localeCompare(b.name || '')).forEach(br => {
                const o = document.createElement('option');
                o.value = String(br.id);
                o.textContent = br.name;
                brandSel.appendChild(o);
            });
            if (prev) brandSel.value = prev;
        }
        populateEmployeeBranchFilter(brandSel ? brandSel.value : '');
    }

    // Load filter dropdown for user modal
    function loadUserModalFilterDropdown() {
        fetch('/admin/departments')
            .then(response => response.json())
            .then(departments => {
                const filterSelect = document.getElementById('userModalFilterDepartment');
                if (filterSelect) {
                    const prev = filterSelect.value;
                    filterSelect.innerHTML = '<option value="">All departments</option>';

                    // Group by branch, excluding each branch's default "Restaurant" area
                    // (restaurant employees are filtered by brand/branch instead).
                    const departmentsByBuilding = {};
                    departments.forEach(dept => {
                        if ((dept.name || '') === 'Restaurant') return;
                        const key = dept.branch_name || OFFICE_BRANCH_LABEL_JS;
                        if (!departmentsByBuilding[key]) departmentsByBuilding[key] = [];
                        departmentsByBuilding[key].push(dept);
                    });

                    Object.keys(departmentsByBuilding).sort().forEach(buildingName => {
                        const group = document.createElement('optgroup');
                        group.label = buildingName;
                        departmentsByBuilding[buildingName].sort((a, b) => a.name.localeCompare(b.name)).forEach(dept => {
                            const option = document.createElement('option');
                            option.value = dept.id;
                            option.textContent = dept.name;
                            group.appendChild(option);
                        });
                        filterSelect.appendChild(group);
                    });
                    if (prev) filterSelect.value = prev;
                }
                populateEmployeeFilterSelects();
            })
            .catch(error => {
                console.error('Error loading departments for filter:', error);
            });
    }

    function resolveEmployeeEditLocation(rowUser) {
        const result = {
            departmentId: rowUser ? rowUser.department_id : null,
            brandId: null,
            branchId: null,
            venue: rowUser && rowUser.branch_name === OFFICE_BRANCH_LABEL_JS ? 'office' : 'restaurant',
        };
        if (!rowUser || !rowUser.department_id) return result;

        const dept = departmentsData.find(function (d) {
            return String(d.id) === String(rowUser.department_id);
        });
        if (!dept || dept.branch_id == null) {
            result.venue = 'office';
            return result;
        }

        result.venue = 'restaurant';
        result.branchId = dept.branch_id;
        const branch = branchesData.find(function (b) {
            return String(b.id) === String(dept.branch_id);
        });
        if (branch) result.brandId = branch.brand_id;
        return result;
    }

    // Handle bulk adding users from modal
    function handleAddBulkUsersModal() {
        const venue = document.getElementById('bulkEmployeeVenue') ? document.getElementById('bulkEmployeeVenue').value : '';
        const brandId = document.getElementById('bulkUserModalBrand') ? document.getElementById('bulkUserModalBrand').value : '';
        const buildingId = document.getElementById('bulkUserModalBranch').value;
        const departmentId = document.getElementById('bulkUserModalDepartment').value;
        const userNamesText = document.getElementById('bulkUserNames').value.trim();

        if (!venue) {
            alert('Please choose Restaurant or Office.');
            return;
        }
        if (venue === 'restaurant') {
            if (!brandId) {
                alert('Please select a brand.');
                return;
            }
            if (!buildingId) {
                alert('Please select a branch.');
                return;
            }
        }
        
        if (!departmentId) {
            alert('Please select a department.');
            return;
        }
        
        if (!userNamesText) {
            alert('Please enter employee names.');
            return;
        }
        
        // Split the text into individual names and filter out empty lines
        const userNames = userNamesText.split('\n')
            .map(name => name.trim())
            .filter(name => name.length > 0);
        
        if (userNames.length === 0) {
            alert('Please enter at least one valid employee name.');
            return;
        }
        
        // Show confirmation with count
        AppDialogs.confirm({
            title: 'Add employees',
            message: `Add ${userNames.length} employee(s) to the selected department?\n\nEmployees to add:\n${userNames.join('\n')}`,
            confirmText: 'Add'
        }).then(function (ok) {
        if (!ok) return;
        
        fetch('/admin/users/bulk', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                users: userNames,
                department_id: parseInt(departmentId)
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.added_users) {
                // Clear the form
                document.getElementById('bulkUserNames').value = '';
                if (document.getElementById('bulkEmployeeVenue')) document.getElementById('bulkEmployeeVenue').value = '';
                const bbm = document.getElementById('bulkUserModalBrand');
                if (bbm) bbm.value = '';
                document.getElementById('bulkUserModalBranch').value = '';
                document.getElementById('bulkUserModalDepartment').value = '';
                document.getElementById('bulkUserModalDepartment').innerHTML = '<option value="">Choose location first</option>';
                syncBulkEmployeeRegisterVenue();
                
                // Reload data
                loadUserModalUsers();
                refreshOwnersIfAddAssetForm();
                
                // Show results
                let message = `Successfully added ${data.total_added} employee(s)!`;
                if (data.total_errors > 0) {
                    message += `\n\n${data.total_errors} employee(s) could not be added:\n${data.errors.join('\n')}`;
                }
                alert(message);
            } else {
                alert(data.error || 'Failed to add employees.');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Failed to add employees.');
        });
        });
    }

    // Update bulk user modal departments when building changes
    function updateBulkUserModalDepartments(buildingId) {
        const departmentSelect = document.getElementById('bulkUserModalDepartment');
        if (!departmentSelect) return;
        departmentSelect.innerHTML = '<option value="">Loading...</option>';
        
        if (!buildingId) {
            departmentSelect.innerHTML = '<option value="">Select Branch First</option>';
            return;
        }
        
        fetch(`/admin/departments?branch_id=${buildingId}`)
            .then(response => response.json())
            .then(departments => {
                const venueEl = document.getElementById('bulkEmployeeVenue');
                const venue = venueEl ? venueEl.value : '';
                if (venue === 'restaurant') {
                    const pick = departments.filter(function (d) { return d.name === RESTAURANT_DEFAULT_DEPT_JS; });
                    departmentSelect.innerHTML = '';
                    if (pick.length === 0) {
                        departmentSelect.innerHTML = '<option value="">Default department missing; contact IT</option>';
                        return;
                    }
                    pick.forEach(function (dept) {
                        const option = document.createElement('option');
                        option.value = dept.id;
                        option.textContent = dept.name;
                        departmentSelect.appendChild(option);
                    });
                    departmentSelect.value = String(pick[0].id);
                    return;
                }
                departmentSelect.innerHTML = '<option value="">Select department</option>';
                departments.forEach(department => {
                    const option = document.createElement('option');
                    option.value = department.id;
                    option.textContent = department.name;
                    departmentSelect.appendChild(option);
                });
            })
            .catch(error => {
                console.error('Error loading departments:', error);
                departmentSelect.innerHTML = '<option value="">Error loading departments</option>';
            });
    }

    function setupMgmtBulkDeletes() {
        const configs = [
            {
                tbodyId: 'branchesList',
                selectAllId: 'selectAllBranchesCheckbox',
                rowClass: 'branch-row-checkbox',
                bulkBtnId: 'bulkDeleteBranchesBtn',
                deleteUrl: function (id) { return '/admin/branches/' + encodeURIComponent(id); },
                afterDelete: function () { loadBranches(); loadDepartments(); }
            },
            {
                tbodyId: 'departmentsList',
                selectAllId: 'selectAllDepartmentsCheckbox',
                rowClass: 'department-row-checkbox',
                bulkBtnId: 'bulkDeleteDepartmentsBtn',
                deleteUrl: function (id) { return '/admin/departments/' + encodeURIComponent(id); },
                afterDelete: function () { loadDepartments(); }
            },
            {
                tbodyId: 'userModalList',
                selectAllId: 'selectAllEmployeesRosterCheckbox',
                rowClass: 'employee-roster-checkbox',
                bulkBtnId: 'bulkDeleteEmployeesRosterBtn',
                deleteUrl: function (id) { return '/admin/users/' + encodeURIComponent(id); },
                afterDelete: function () {
                    const sel = document.getElementById('userModalFilterDepartment');
                    loadUserModalUsers(sel && sel.value ? sel.value : '');
                    refreshOwnersIfAddAssetForm();
                }
            },
            {
                tbodyId: 'assetTypesList',
                selectAllId: 'selectAllAssetTypesCheckbox',
                rowClass: 'asset-type-row-checkbox',
                bulkBtnId: 'bulkDeleteAssetTypesBtn',
                deleteUrl: function (id) { return '/admin/asset-types/' + encodeURIComponent(id); },
                afterDelete: function () {
                    loadAssetTypes();
                    loadAssetNames();
                    updateAssetNameDropdowns();
                }
            },
            {
                tbodyId: 'assetNamesList',
                selectAllId: 'selectAllAssetNamesCheckbox',
                rowClass: 'asset-name-row-checkbox',
                bulkBtnId: 'bulkDeleteAssetNamesBtn',
                deleteUrl: function (id) { return '/admin/asset-names/' + encodeURIComponent(id); },
                afterDelete: function () {
                    loadAssetNames();
                    updateAssetNameDropdowns();
                }
            }
        ];

        configs.forEach(function (t) {
            const meta = SETTINGS_MGMT_BULK_META[t.tbodyId] || {};
            const cfg = Object.assign({}, t, meta);
            const tbody = document.getElementById(cfg.tbodyId);
            const selectAll = document.getElementById(cfg.selectAllId);
            const bulkBtn = document.getElementById(cfg.bulkBtnId);
            if (!tbody || !selectAll || !bulkBtn) return;
            if (tbody.dataset.mgmtBulkBound === '1') return;
            tbody.dataset.mgmtBulkBound = '1';

            function rowBoxes() {
                return tbody.querySelectorAll('.' + cfg.rowClass);
            }

            function updateBulkBtn() {
                const n = tbody.querySelectorAll('.' + cfg.rowClass + ':checked').length;
                if (cfg.bulkBarId) {
                    const bar = document.getElementById(cfg.bulkBarId);
                    const cnt = cfg.selectedCountId && document.getElementById(cfg.selectedCountId);
                    if (bar) bar.style.display = n ? 'block' : 'none';
                    if (cnt) cnt.textContent = String(n);
                    bulkBtn.style.display = n ? 'inline-flex' : 'none';
                    if (n) {
                        bulkBtn.innerHTML = '<i class="bi bi-trash"></i> Delete Selected';
                    }
                } else {
                    bulkBtn.style.display = n ? 'inline-flex' : 'none';
                    bulkBtn.innerHTML = '<i class="bi bi-trash me-1"></i> Delete Selected (' + n + ')';
                }
            }

            function syncSelectAll() {
                const list = rowBoxes();
                if (!list.length) {
                    selectAll.checked = false;
                    selectAll.indeterminate = false;
                    return;
                }
                const checked = tbody.querySelectorAll('.' + cfg.rowClass + ':checked');
                selectAll.checked = checked.length === list.length;
                selectAll.indeterminate = checked.length > 0 && checked.length < list.length;
            }

            selectAll.addEventListener('change', function () {
                rowBoxes().forEach(function (cb) { cb.checked = selectAll.checked; });
                selectAll.indeterminate = false;
                updateBulkBtn();
            });

            tbody.addEventListener('change', function (e) {
                if (e.target.classList.contains(cfg.rowClass)) {
                    updateBulkBtn();
                    syncSelectAll();
                }
            });

            if (cfg.clearBtnId) {
                const clearBtn = document.getElementById(cfg.clearBtnId);
                if (clearBtn && clearBtn.dataset.mgmtBulkClearBound !== '1') {
                    clearBtn.dataset.mgmtBulkClearBound = '1';
                    clearBtn.addEventListener('click', function () {
                        rowBoxes().forEach(function (cb) { cb.checked = false; });
                        selectAll.checked = false;
                        selectAll.indeterminate = false;
                        updateBulkBtn();
                    });
                }
            }

            bulkBtn.addEventListener('click', function () {
                const checked = Array.prototype.slice.call(tbody.querySelectorAll('.' + cfg.rowClass + ':checked'));
                if (!checked.length) return;
                appDeleteConfirm(
                    'Delete ' + checked.length + ' selected item(s)? This cannot be undone.',
                    'Delete selected'
                ).then(function (ok) {
                if (!ok) return;
                Promise.all(checked.map(function (cb) {
                    return fetch(cfg.deleteUrl(cb.value), { method: 'DELETE' })
                        .then(function (r) {
                            return r.json().catch(function () { return {}; }).then(function (data) {
                                if (!r.ok || data.success !== true) {
                                    return { error: data.error || 'Request failed' };
                                }
                                return {};
                            });
                        });
                })).then(function (results) {
                    const errs = results.filter(function (x) { return x && x.error; });
                    if (errs.length) {
                        alert('Some items could not be deleted:\n' + errs.map(function (e) { return e.error; }).join('\n'));
                    }
                    selectAll.checked = false;
                    selectAll.indeterminate = false;
                    bulkBtn.style.display = 'none';
                    hideSettingsMgmtBulkBar(cfg.tbodyId);
                    cfg.afterDelete();
                }).catch(function () {
                    alert('Network error during bulk delete.');
                });
                });
            });
        });
    }

    /** Server-rendered QR pages using DB-backed mm layouts (see /assets/api/qr-label-layout/...) */
    function fetchServerQrBatchPrint(payload) {
        return fetch('/assets/qr-label-print/batch', {
            method: 'POST',
            credentials: 'same-origin',
            cache: 'no-store',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function (response) {
            return response.text().then(function (text) {
                if (!response.ok) {
                    var msg = text || 'Print request failed';
                    try {
                        var errObj = JSON.parse(text);
                        if (errObj && errObj.error) msg = errObj.error;
                    } catch (_ignore) { /* plain text body */ }
                    throw new Error(msg);
                }
                return text;
            });
        }).then(function (html) {
            // Blob navigation (not document.write on about:blank) -- Chromium reliably applies @page sizing
            // and absolute mm layout to the real print pipeline; document.write often matches screen only.
            var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var w = window.open(url, '_blank', 'noopener');
            if (!w) {
                URL.revokeObjectURL(url);
                alert('Pop-up blocked. Allow pop-ups so the print view can open.');
                return;
            }
            w.addEventListener('beforeunload', function () {
                URL.revokeObjectURL(url);
            }, { once: true });
        });
    }

    const ASSET_BULK_STORAGE_KEY = 'assetRegisterBulk_v1';

    function assetRegisterFilterKey() {
        const u = new URL(window.location.href);
        u.searchParams.delete('page');
        return u.pathname + '?' + u.searchParams.toString();
    }

    function persistAssetBulkSelection() {
        try {
            if (!selectedAssets.length) {
                sessionStorage.removeItem(ASSET_BULK_STORAGE_KEY);
                return;
            }
            sessionStorage.setItem(ASSET_BULK_STORAGE_KEY, JSON.stringify({
                filterKey: assetRegisterFilterKey(),
                assets: selectedAssets
            }));
        } catch (e) { /* ignore quota */ }
    }

    // Clear the selection state and its persisted copy so a page reload after a
    // bulk action (e.g. archive) does not restore a now-stale selection.
    function clearAssetBulkSelectionState() {
        selectedAssets = [];
        try {
            sessionStorage.removeItem(ASSET_BULK_STORAGE_KEY);
        } catch (e) { /* ignore */ }
    }

    function tryRestoreAssetBulkSelection() {
        try {
            const raw = sessionStorage.getItem(ASSET_BULK_STORAGE_KEY);
            if (!raw) return;
            const obj = JSON.parse(raw);
            if (!obj || !Array.isArray(obj.assets) || obj.filterKey !== assetRegisterFilterKey()) {
                if (obj && obj.filterKey !== assetRegisterFilterKey()) {
                    sessionStorage.removeItem(ASSET_BULK_STORAGE_KEY);
                }
                return;
            }
            selectedAssets = obj.assets;
        } catch (e) {
            sessionStorage.removeItem(ASSET_BULK_STORAGE_KEY);
        }
    }

    function applyAssetCheckboxDomFromSelection() {
        const idSet = new Set(selectedAssets.map(function (a) { return String(a.id); }));
        document.querySelectorAll('.asset-checkbox').forEach(function (cb) {

            cb.checked = idSet.has(String(aid));
        });

    function syncRegisterSelectAllVisual() {
        const meta = document.getElementById('registerMatchingTotal');
        const sac = document.getElementById('selectAllCheckbox');
        if (!sac) return;
        const total = meta ? parseInt(meta.getAttribute('data-total') || '0', 10) || 0 : 0;
        const n = selectedAssets.length;
        if (total === 0) {
            sac.checked = false;
            sac.indeterminate = false;
            return;
        }
        sac.checked = n > 0 && n === total;
        sac.indeterminate = n > 0 && n < total;
    }

    function fetchAllMatchingRegisterIds() {
        const u = new URL(window.location.href);
        u.searchParams.delete('page');
        return fetch('/assets/matching-register-ids?' + u.searchParams.toString())
            .then(function (r) {
                return r.json().then(function (data) {
                    return { ok: r.ok, data: data };
                });
            })
            .then(function (res) {
                if (!res.ok || !res.data || !Array.isArray(res.data.assets)) {
                    throw new Error((res.data && res.data.error) || 'Failed to load matching assets');
                }
                return res.data.assets;
            });
    }

    var selectAllCb = document.getElementById('selectAllCheckbox');

        selectAllCb.addEventListener('change', function () {
            const isChecked = this.checked;
            if (!isChecked) {
                selectedAssets = [];
                persistAssetBulkSelection();
                applyAssetCheckboxDomFromSelection();
                updateBulkActionsBar();
                syncRegisterSelectAllVisual();
                return;
            }
            const sac = this;
            sac.disabled = true;
            fetchAllMatchingRegisterIds()
                .then(function (assets) {
                    selectedAssets = assets;
                    persistAssetBulkSelection();
                    applyAssetCheckboxDomFromSelection();
                    updateBulkActionsBar();
                    syncRegisterSelectAllVisual();
                })
                .catch(function (err) {
                    alert(err.message || 'Could not select all matching assets.');
                    sac.checked = false;
                    syncRegisterSelectAllVisual();
                })
                .finally(function () {
                    sac.disabled = false;
                });
        });

        document.querySelectorAll('.asset-checkbox').forEach(function (checkbox) {
            checkbox.addEventListener('change', function () {
                const assetId = this.getAttribute('data-asset-id');
                const assetName = this.getAttribute('data-asset-name');
                const assetCode = this.getAttribute('data-asset-code') || '';

                if (this.checked) {
                    if (!selectedAssets.some(function (a) { return String(a.id) === String(assetId); })) {
                        selectedAssets.push({ id: assetId, name: assetName, code: assetCode });
                    }
                } else {
                    selectedAssets = selectedAssets.filter(function (asset) { return String(asset.id) !== String(assetId); });
                }

                persistAssetBulkSelection();
                syncRegisterSelectAllVisual();
                updateBulkActionsBar();
            });
        });
    }

                const buildingSelect = document.getElementById('edit_branch');
                const venue = getEditAssetVenue();
                buildingSelect.innerHTML = '<option value="">Select Branch</option>';
                if (venue === 'office') {
                    const officeOpt = document.createElement('option');
                    officeOpt.value = OFFICE_BRANCH_LABEL_JS;
                    officeOpt.textContent = OFFICE_BRANCH_LABEL_JS;
                    buildingSelect.appendChild(officeOpt);
                } else {
                    let list = buildings;
                    if (filterBrandId !== undefined && filterBrandId !== null && String(filterBrandId) !== '') {
                        list = buildings.filter(function (b) {
                            return String(b.brand_id) === String(filterBrandId);
                        });
                    } else {
                        list = [];
                    }
                    const sorted = [...list].sort((a, b) => a.name.localeCompare(b.name));
                    sorted.forEach(building => {
                        const option = document.createElement('option');
                        option.value = building.name;
                        option.textContent = building.name;
                        buildingSelect.appendChild(option);
                    });
                }
                if (selectedBuilding) {
                    buildingSelect.value = selectedBuilding;
                }
            })
            .catch(error => {
                console.error('Error loading branches for edit:', error);
                throw error;
            });
    }
    
    function loadEditDepartments(selectedBuilding, selectedDepartment) {
        if (!selectedBuilding) return Promise.resolve();
        const departmentSelect = document.getElementById('edit_department');
        if (!departmentSelect) return Promise.resolve();

        if (selectedBuilding === OFFICE_BRANCH_LABEL_JS) {
            departmentSelect.innerHTML = '<option value="">Select department</option>';
            return fetch('/admin/departments?office_only=1')
                .then(response => response.json())
                .then(departments => {
                    departments.forEach(department => {
                        const option = document.createElement('option');
                        option.value = department.name;
                        option.textContent = department.name;
                        departmentSelect.appendChild(option);
                    });
                    if (selectedDepartment) {
                        departmentSelect.value = selectedDepartment;
                    }
                })
                .catch(error => {
                    console.error('Error loading office departments:', error);
                    throw error;
                });
        }

        if (getEditAssetVenue() === 'restaurant') {
            departmentSelect.innerHTML = '';
            const depName = selectedDepartment || RESTAURANT_DEFAULT_DEPT_JS;
            const op = document.createElement('option');
            op.value = depName;
            op.textContent = depName;
            departmentSelect.appendChild(op);
            departmentSelect.value = depName;
            return Promise.resolve();
        }

        return Promise.resolve();
    }
    
    function loadEditOwners(selectedBuilding, selectedDepartment, selectedOwner) {
        console.log('Loading owners for edit, building:', selectedBuilding, 'department:', selectedDepartment, 'owner:', selectedOwner);
        if (!selectedBuilding || !selectedDepartment) return Promise.resolve();
        
        // Find department ID
        return fetch('/admin/departments')
            .then(response => response.json())
            .then(departments => {
                const department = departments.find(d =>
                    d.name === selectedDepartment &&
                    ((selectedBuilding === OFFICE_BRANCH_LABEL_JS &&
                        (d.branch_id == null || d.branch_name === OFFICE_BRANCH_LABEL_JS)) ||
                        (d.branch_name === selectedBuilding))
                );
                
                if (department) {
                    return fetch(`/admin/users?department_id=${department.id}`);
                }
                return Promise.reject('Department not found');
            })
            .then(response => response.json())
            .then(users => {
                const ownerSelect = document.getElementById('edit_owner');
                ownerSelect.innerHTML = '<option value="">Select Owner</option>';
                
                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.name;
                    option.textContent = user.name;
                    ownerSelect.appendChild(option);
                });
                
                // Set the selected owner after populating options
                if (selectedOwner && selectedOwner !== 'No Owner') {
                    ownerSelect.value = selectedOwner;
                    console.log('Set owner to:', selectedOwner);
                }
            })
            .catch(error => {
                console.error('Error loading users for edit:', error);
                throw error;
            });
    }

    // --- Improved Asset Name Multi-Select ---
    const assetNameInput = document.getElementById('name');
    const assetNameDropdown = document.getElementById('assetNameDropdown');
    const assetNameList = document.getElementById('assetNameList');
    let allAssetNames = [];
    let filteredAssetNames = [];

    // Helper: Populate allAssetNames from asset type selection
    function updateAllAssetNames() {
        const assetTypeSelect = document.getElementById('asset_type');
        const selectedType = assetTypeSelect.value;
        
        if (selectedType && window.assetNamesByType && window.assetNamesByType[selectedType]) {
            allAssetNames = window.assetNamesByType[selectedType].map(item => item.name);
        } else {
            allAssetNames = [];
        }
        renderAssetNameOptions('');
    }

    // Helper: Render custom dropdown options
    function renderAssetNameOptions(filter = '') {
        assetNameList.innerHTML = '';
        dropdownItems = [];
        const lowerFilter = filter.trim().toLowerCase();
        
        // Show all available options when no filter is applied
        if (lowerFilter === '') {
            filteredAssetNames = allAssetNames.filter(name => !selectedAssetNames.includes(name));
        } else {
            filteredAssetNames = allAssetNames.filter(name =>
                !selectedAssetNames.includes(name) &&
                name.toLowerCase().includes(lowerFilter)
            );
        }
        
        if (filteredAssetNames.length === 0) {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.textContent = 'No asset names found';
            item.style.color = '#6c757d';
            item.style.fontStyle = 'italic';
            assetNameList.appendChild(item);
        } else {
            filteredAssetNames.forEach((name, index) => {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.textContent = name;
                item.style.cursor = 'pointer';
                item.dataset.index = index;
                item.onclick = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    addAssetNameToSelection(name);
                    assetNameInput.value = '';
                    selectedIndex = -1;
                    // Re-render options to remove the selected item
                    renderAssetNameOptions('');
                    // Keep dropdown open for next selection
                    if (filteredAssetNames.length > 0) {
                        assetNameInput.focus();
                    } else {
                        hideDropdown();
                    }
                };
                assetNameList.appendChild(item);
                dropdownItems.push(item);
            });
        }
        // Reset selection when rendering new options
        selectedIndex = -1;
        updateDropdownSelection();
    }

    // Update dropdown selection highlighting
    function updateDropdownSelection() {
        dropdownItems.forEach((item, index) => {
            if (index === selectedIndex) {
                item.style.backgroundColor = '#007bff';
                item.style.color = 'white';
                item.classList.add('selected');
            } else {
                item.style.backgroundColor = '';
                item.style.color = '';
                item.classList.remove('selected');
            }
        });
    }

    // Show dropdown
    function showDropdown() {
        assetNameDropdown.style.display = 'block';
        renderAssetNameOptions(assetNameInput.value);
    }

    // Hide dropdown
    function hideDropdown() {
        assetNameDropdown.style.display = 'none';
    }

    // On input: filter options
    assetNameInput.addEventListener('input', function() {
        showDropdown();
        renderAssetNameOptions(assetNameInput.value);
    });
    
    // Keep dropdown open when typing
    assetNameInput.addEventListener('keyup', function() {
        if (assetNameInput.value.trim() !== '') {
            showDropdown();
            renderAssetNameOptions(assetNameInput.value);
        }
    });

    // On focus: show all options immediately
    assetNameInput.addEventListener('focus', function() {
        showDropdown();
        renderAssetNameOptions('');
    });

    // On click: also show all options
    assetNameInput.addEventListener('click', function() {
        showDropdown();
        renderAssetNameOptions('');
    });

    // Keyboard navigation variables
    let selectedIndex = -1;
    let dropdownItems = [];

    // On Enter: add asset name as tag
    assetNameInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const val = assetNameInput.value.trim();
            if (val && filteredAssetNames.includes(val)) {
                addAssetNameToSelection(val);
                assetNameInput.value = '';
                selectedIndex = -1;
                renderAssetNameOptions('');
                if (filteredAssetNames.length > 0) {
                    assetNameInput.focus();
                } else {
                    hideDropdown();
                }
            } else if (selectedIndex >= 0 && dropdownItems[selectedIndex]) {
                // Select highlighted item
                const selectedName = dropdownItems[selectedIndex].textContent;
                addAssetNameToSelection(selectedName);
                assetNameInput.value = '';
                selectedIndex = -1;
                renderAssetNameOptions('');
                if (filteredAssetNames.length > 0) {
                    assetNameInput.focus();
                } else {
                    hideDropdown();
                }
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (dropdownItems.length > 0) {
                selectedIndex = Math.min(selectedIndex + 1, dropdownItems.length - 1);
                updateDropdownSelection();
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (dropdownItems.length > 0) {
                selectedIndex = Math.max(selectedIndex - 1, -1);
                updateDropdownSelection();
            }
        } else if (e.key === 'Escape') {
            e.preventDefault();
            hideDropdown();
            selectedIndex = -1;
        } else if (e.key === 'Backspace' && assetNameInput.value === '') {
            // Remove last tag if input is empty
            if (selectedAssetNames.length > 0) {
                removeAssetNameFromSelection(selectedAssetNames[selectedAssetNames.length - 1]);
            }
        }
    });

    // Hide dropdown when clicking outside
    document.addEventListener('click', function(e) {
        if (!assetNameInput.contains(e.target) && !assetNameDropdown.contains(e.target)) {
            hideDropdown();
        }
    });
    
    // Prevent dropdown from closing when clicking inside it
    assetNameDropdown.addEventListener('click', function(e) {
        e.stopPropagation();
    });

    // When removing a tag, re-render options
    function addAssetNameToSelection(assetName) {
        if (!selectedAssetNames.includes(assetName)) {
            selectedAssetNames.push(assetName);
            updateSelectedAssetNamesDisplay();
            updateHiddenInput();
            renderAddAssetSpecFields();
        }
    }
    
    function removeAssetNameFromSelection(assetName) {
        const index = selectedAssetNames.indexOf(assetName);
        if (index > -1) {
            selectedAssetNames.splice(index, 1);
            updateSelectedAssetNamesDisplay();
            updateHiddenInput();
            renderAddAssetSpecFields();
        }
    }

    // Update dropdown when asset type changes
    document.getElementById('asset_type').addEventListener('change', function() {
        updateAllAssetNames();
        renderAddAssetSpecFields();
    });





  </script>
