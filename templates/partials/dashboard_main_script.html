<script>
window.chartData = {
        branchCounts: {{ chart_data.branch_counts|tojson }},
        totalSystemValue: {{ chart_data.total_system_value }}
    };

/**
 * ASSET TRACKING SYSTEM - MAIN JAVASCRIPT
 * ========================================
 * 
 * This file contains all JavaScript functionality for the Asset Tracking System.
 * The code is organized into logical sections for easy navigation and debugging:
 * 
 * 1. GLOBAL VARIABLES - Shared state across functions
 * 2. DATA LOADING - Functions to fetch and cache data
 * 3. BRANCH MANAGEMENT - CRUD operations for branches
 * 4. DEPARTMENT MANAGEMENT - CRUD operations for departments
 * 5. USER MANAGEMENT - CRUD operations for users
 * 6. QR CODE FUNCTIONALITY - QR generation and display
 * 7. BULK SELECTION - Multi-select and bulk operations
 * 8. EVENT LISTENERS - All user interaction handlers
 * 9. UTILITY FUNCTIONS - Helper functions
 * 10. INITIALIZATION - Page load setup
 * 
 * DEBUGGING TIPS:
 * - Use browser console to inspect global variables
 * - Check network tab for API calls
 * - Use breakpoints in specific function sections
 * - Monitor selectedAssets array for bulk operations
 */

// ============================================================================
// GLOBAL VARIABLES & STATE MANAGEMENT
// ============================================================================
let branchesData = [];

window.AssetAppState = {
    get brands() { return brandsData; },
    get branches() { return branchesData; },
    get departments() { return departmentsData; },
    get assetTypes() { return assetTypesData; }
};

window.MgmtEditCallbacks = {
    onBranchSaved: function () {
        loadBranches();
        loadDepartments();
    },
    onDepartmentSaved: function () {
        loadDepartments();
        if (typeof updateDepartmentQRList === 'function') updateDepartmentQRList();
    },
    onEmployeeSaved: function () {
        var filter = document.getElementById('userModalFilterDepartment');
        loadUserModalUsers(filter && filter.value ? filter.value : '');
        if (typeof refreshOwnersIfAddAssetForm === 'function') refreshOwnersIfAddAssetForm();
    },
    onAssetTypeSaved: function () {
        loadAssetTypes();
        loadAssetNames();
        if (typeof updateAssetNameDropdowns === 'function') updateAssetNameDropdowns();
        if (window.MgmtAddAssetModals && window.MgmtAddAssetModals.refreshAssetNameTypeCombo) {
            window.MgmtAddAssetModals.refreshAssetNameTypeCombo();
        }
    }
};
let brandsData = [];
let assetTypesData = [];
/** Must match ``routes.assets.OFFICE_BRANCH_LABEL`` and server admin responses. */
const OFFICE_BRANCH_LABEL_JS = 'Office';
/** Must match ``models.database.RESTAURANT_DEFAULT_DEPARTMENT_NAME`` and server assets routes. */
const RESTAURANT_DEFAULT_DEPT_JS = 'Restaurant';

function mgmtShowError(message) {
    if (window.AppDialogs) return AppDialogs.error(message);
    alert(message);
    return Promise.resolve();
}

function refreshSettingsTableSearch(tbodyId) {
    if (typeof applySettingsTableSearch === 'function') {
        applySettingsTableSearch(tbodyId);
    }
}

let departmentsData = [];
let selectedAssets = [];
/** Server print layout preset (2 in x 2 in labels); must match qr_label_layouts.preset_key */
const QR_LABEL_PRESET = 'label_2x2';




    function getAddAssetVenue() {
        const r = document.querySelector('input[name="asset_venue_ui"]:checked');
        return r ? r.value : 'restaurant';
    }

    function syncAddAssetVenueField() {
        const h = document.getElementById('assetVenueField');
        if (h) h.value = getAddAssetVenue();
    }

    function getEditAssetVenue() {
        const r = document.querySelector('input[name="edit_asset_venue_ui"]:checked');
        return r ? r.value : 'restaurant';
    }

    function syncEditAssetVenueField() {
        const h = document.getElementById('editAssetVenueField');
        if (h) h.value = getEditAssetVenue();
    }

    function assetTypeAppliesToVenue(t, venue) {
        if (!t || !venue) return false;
        const fv = (t.for_venue || 'restaurant');
        if (t.branch_id || t.department_id) {
            return fv === venue;
        }
        return fv === venue || fv === 'both';
    }

    function locationLabelForAssetTypeRow(t) {
        if (!t) return '';
        if (!t.branch_id && !t.department_id) {
            const fv = (t.for_venue || 'restaurant');
            if (fv === 'both') return 'All restaurants & All office departments';
            return (fv === 'office') ? 'All office departments' : 'All restaurants';
        }
        const venue = (t.for_venue === 'office') ? 'Office' : 'Restaurant';
        if (t.branch_name) {
            return t.brand_name ? (venue + ' — ' + t.brand_name + ' — ' + t.branch_name) : (venue + ' — ' + t.branch_name);
        }
        if (t.department_name) {
            return venue + ' — ' + t.department_name;
        }
        return venue;
    }

    function typesMatchingAssetModalLocation(venue) {
        return (assetTypesData || []).filter(function (t) {
            return !t.branch_id && !t.department_id && assetTypeAppliesToVenue(t, venue);
        });
    }

    function settingsAssetTypesForNewNameRow() {
        const vEl = document.getElementById('newAssetNameVenue');
        const venue = vEl ? vEl.value : '';
        if (!venue) {
            return [];
        }
        return typesMatchingAssetModalLocation(venue);
    }

    function updateSettingsNewAssetNameTypeDropdown() {
        const sel = document.getElementById('newAssetNameType');
        if (!sel) {
            return;
        }
        const prev = sel.value;
        sel.innerHTML = '<option value="">Select asset type</option>';
        settingsAssetTypesForNewNameRow().forEach(function (t) {
            const o = document.createElement('option');
            o.value = String(t.id);
            o.textContent = t.label || t.name;
            sel.appendChild(o);
        });
        if (prev && Array.prototype.some.call(sel.options, function (opt) { return opt.value === prev; })) {
            sel.value = prev;
        }
    }

    function updateSettingsAssetNameFilterDropdown() {
        const sel = document.getElementById('assetNameFilterType');
        if (!sel) {
            return;
        }
        const prev = sel.value;
        sel.innerHTML = '<option value="">All asset types</option>';
        (assetTypesData || []).forEach(function (t) {
            const o = document.createElement('option');
            o.value = String(t.id);
            o.textContent = t.label || t.name;
            sel.appendChild(o);
        });
        if (prev && Array.prototype.some.call(sel.options, function (opt) { return opt.value === prev; })) {
            sel.value = prev;
        }
    }

    function syncSettingsNewAssetTypeVenueFields() {
        const v = document.getElementById('newAssetTypeVenue');
        const bw = document.getElementById('newAssetTypeBrandWrap');
        const rw = document.getElementById('newAssetTypeBranchWrap');
        const ow = document.getElementById('newAssetTypeOfficeDeptWrap');
        const b = document.getElementById('newAssetTypeBrand');
        const br = document.getElementById('newAssetTypeBranch');
        const od = document.getElementById('newAssetTypeOfficeDepartment');
        if (!v || !bw || !rw || !ow) {
            return;
        }
        const val = v.value;
        if (val === 'restaurant') {
            bw.classList.remove('d-none');
            rw.classList.remove('d-none');
            ow.classList.add('d-none');
            if (od) {
                od.innerHTML = '<option value="">Select department</option>';
                od.value = '';
            }
            _fillBrandSelect(b);
            if (br) {
                br.innerHTML = '<option value="">Select branch</option>';
            }
            if (b) {
                b.value = '';
            }
        } else if (val === 'office') {
            bw.classList.add('d-none');
            rw.classList.add('d-none');
            ow.classList.remove('d-none');
            if (b) {
                b.value = '';
            }
            if (br) {
                br.innerHTML = '<option value="">Select branch</option>';
            }
            if (od) {
                od.innerHTML = '<option value="">Loading...</option>';
                fetch('/admin/departments?office_only=1')
                    .then(function (r) { return r.json(); })
                    .then(function (depts) {
                        od.innerHTML = '<option value="">Select department</option>';
                        depts.forEach(function (d) {
                            const option = document.createElement('option');
                            option.value = String(d.id);
                            option.textContent = d.name;
                            od.appendChild(option);
                        });
                    })
                    .catch(function () {
                        od.innerHTML = '<option value="">Error loading departments</option>';
                    });
            }
        } else {
            bw.classList.add('d-none');
            rw.classList.add('d-none');
            ow.classList.add('d-none');
            if (b) {
                b.value = '';
            }
            if (br) {
                br.innerHTML = '<option value="">Select branch</option>';
            }
            if (od) {
                od.innerHTML = '<option value="">Select department</option>';
                od.value = '';
            }
        }
    }

    function syncSettingsNewAssetNameVenueFields() {
        const v = document.getElementById('newAssetNameVenue');
        const bw = document.getElementById('newAssetNameBrandWrap');
        const rw = document.getElementById('newAssetNameBranchWrap');
        const ow = document.getElementById('newAssetNameOfficeDeptWrap');
        const b = document.getElementById('newAssetNameBrand');
        const br = document.getElementById('newAssetNameBranch');
        const od = document.getElementById('newAssetNameOfficeDepartment');
        if (!v || !bw || !rw || !ow) {
            return;
        }
        const val = v.value;
        if (val === 'restaurant') {
            bw.classList.remove('d-none');
            rw.classList.remove('d-none');
            ow.classList.add('d-none');
            if (od) {
                od.innerHTML = '<option value="">Select department</option>';
                od.value = '';
            }
            _fillBrandSelect(b);
            if (br) {
                br.innerHTML = '<option value="">Select branch</option>';
            }
            if (b) {
                b.value = '';
            }
        } else if (val === 'office') {
            bw.classList.add('d-none');
            rw.classList.add('d-none');
            ow.classList.remove('d-none');
            if (b) {
                b.value = '';
            }
            if (br) {
                br.innerHTML = '<option value="">Select branch</option>';
            }
            if (od) {
                od.innerHTML = '<option value="">Loading...</option>';
                fetch('/admin/departments?office_only=1')
                    .then(function (r) { return r.json(); })
                    .then(function (depts) {
                        od.innerHTML = '<option value="">Select department</option>';
                        depts.forEach(function (d) {
                            const option = document.createElement('option');
                            option.value = String(d.id);
                            option.textContent = d.name;
                            od.appendChild(option);
                        });
                        updateSettingsNewAssetNameTypeDropdown();
                    })
                    .catch(function () {
                        od.innerHTML = '<option value="">Error loading departments</option>';
                    });
            }
        } else {
            bw.classList.add('d-none');
            rw.classList.add('d-none');
            ow.classList.add('d-none');
            if (b) {
                b.value = '';
            }
            if (br) {
                br.innerHTML = '<option value="">Select branch</option>';
            }
            if (od) {
                od.innerHTML = '<option value="">Select department</option>';
                od.value = '';
            }
        }
        updateSettingsNewAssetNameTypeDropdown();
    }

    function updateSettingsMgmtBranchFromBrand(brandSelectId, branchSelectId) {
        const brandEl = document.getElementById(brandSelectId);
        const buildingSelect = document.getElementById(branchSelectId);
        if (!brandEl || !buildingSelect) {
            return;
        }
        const brandId = brandEl.value;
        buildingSelect.innerHTML = '<option value="">Select branch</option>';
        if (!brandId) {
            return;
        }
        const sorted = branchesData.filter(function (b) { return String(b.brand_id) === String(brandId); })
            .sort(function (a, b) { return a.name.localeCompare(b.name); });
        sorted.forEach(function (building) {
            const option = document.createElement('option');
            option.value = String(building.id);
            option.textContent = building.name;
            buildingSelect.appendChild(option);
        });
    }

    function resolveAssetTypeIdFromContext(typeName, venue) {
        const hit = (assetTypesData || []).find(function (t) {
            return t.name === typeName
                && !t.branch_id
                && !t.department_id
                && assetTypeAppliesToVenue(t, venue);
        });
        return hit ? String(hit.id) : '';
    }

    function fillOfficeDepartmentsSelect(selectEl, placeholderText) {
        if (!selectEl) return Promise.resolve();
        selectEl.innerHTML = '<option value="">' + (placeholderText || 'Select department') + '</option>';
        return fetch('/admin/departments?office_only=1')
            .then(function (response) { return response.json(); })
            .then(function (depts) {
                depts.forEach(function (department) {
                    const option = document.createElement('option');
                    option.value = department.name;
                    option.textContent = department.name;
                    selectEl.appendChild(option);
                });
            });
    }

    function applyAddAssetVenueToAddAssetModal() {
        syncAddAssetVenueField();
        const brandWrap = document.getElementById('addAssetBrandField');
        const brandSel = document.getElementById('add_asset_brand');
        const branchWrap = document.getElementById('addAssetBranchField');
        const branchSelect = document.getElementById('branch');
        const deptWrap = document.getElementById('addAssetDepartmentField');
        const departmentSelect = document.getElementById('department');
        const ownerSelect = document.getElementById('owner');
        if (!departmentSelect) return;
        const v = getAddAssetVenue();
        updateAssetTypeDropdowns();
        if (v === 'office') {
            if (brandWrap) brandWrap.classList.add('d-none');
            if (brandSel) brandSel.value = '';
            if (deptWrap) deptWrap.classList.remove('d-none');
            if (branchWrap) branchWrap.classList.add('d-none');
            if (branchSelect) {
                branchSelect.innerHTML = '<option value="' + OFFICE_BRANCH_LABEL_JS + '" selected>' + OFFICE_BRANCH_LABEL_JS + '</option>';
            }
            departmentSelect.innerHTML = '<option value="">Select department</option>';
            fillOfficeDepartmentsSelect(departmentSelect, 'Select department').then(function () {
                if (ownerSelect) {
                    ownerSelect.innerHTML = '<option value="">Select department first</option>';
                }
            });
        } else {
            if (brandWrap) brandWrap.classList.remove('d-none');
            if (deptWrap) deptWrap.classList.add('d-none');
            if (branchWrap) branchWrap.classList.remove('d-none');
            populateAddAssetBrandSelect();
            if (brandSel) brandSel.value = '';
            updateAddAssetRestaurantBranchDropdown('');
            if (branchSelect) branchSelect.value = '';
            departmentSelect.innerHTML = '';
            var o = document.createElement('option');
            o.value = RESTAURANT_DEFAULT_DEPT_JS;
            o.textContent = RESTAURANT_DEFAULT_DEPT_JS;
            departmentSelect.appendChild(o);
            departmentSelect.value = RESTAURANT_DEFAULT_DEPT_JS;
            if (ownerSelect) ownerSelect.innerHTML = '<option value="">Select branch first</option>';
        }
        clearSelectedAssetNames();
        const at = document.getElementById('asset_type');
        if (at) at.value = '';
    }

    function applyEditAssetVenueToEditModal() {
        syncEditAssetVenueField();
        var brandWrap = document.getElementById('editAssetBrandField');
        var brandSel = document.getElementById('edit_asset_brand');
        var deptWrap = document.getElementById('editAssetDepartmentField');
        var deptSel = document.getElementById('edit_department');
        var ownSel = document.getElementById('edit_owner');
        var bf = document.getElementById('editAssetBranchField');
        var br = document.getElementById('edit_branch');
        if (getEditAssetVenue() === 'office') {
            if (brandWrap) brandWrap.classList.add('d-none');
            if (brandSel) brandSel.value = '';
            if (deptWrap) deptWrap.classList.remove('d-none');
            if (bf) bf.classList.add('d-none');
            if (br) {
                br.innerHTML = '<option value="' + OFFICE_BRANCH_LABEL_JS + '" selected>' + OFFICE_BRANCH_LABEL_JS + '</option>';
            }
            if (deptSel) {
                fillOfficeDepartmentsSelect(deptSel, 'Select department');
            }
            if (ownSel) ownSel.innerHTML = '<option value="">Select department first</option>';
        } else {
            if (brandWrap) brandWrap.classList.remove('d-none');
            if (deptWrap) deptWrap.classList.add('d-none');
            if (bf) bf.classList.remove('d-none');
            populateEditAssetBrandSelect();
            if (brandSel) brandSel.value = '';
            if (br) {
                loadEditBranches('', '').then(function () {
                    if (deptSel) {
                        deptSel.innerHTML = '';
                        var op = document.createElement('option');
                        op.value = RESTAURANT_DEFAULT_DEPT_JS;
                        op.textContent = RESTAURANT_DEFAULT_DEPT_JS;
                        deptSel.appendChild(op);
                        deptSel.value = RESTAURANT_DEFAULT_DEPT_JS;
                    }
                    if (ownSel) ownSel.innerHTML = '<option value="">Select branch first</option>';
                });
            }
        }
    }

    function resolveDepartmentIdForOwnerLookup(departmentName, branchNameForMatch) {
        if (!departmentName) return null;
        const v = getAddAssetVenue();
        if (v === 'office') {
            const d = departmentsData.find(function (x) {
                return x.name === departmentName && (x.branch_id == null || x.branch_name === OFFICE_BRANCH_LABEL_JS);
            });
            return d ? d.id : null;
        }
        const bid = (branchesData.find(function (b) { return b.name === branchNameForMatch; }) || {}).id;
        const d2 = departmentsData.find(function (x) {
            return x.name === departmentName && x.branch_id === bid;
        });
        return d2 ? d2.id : null;
    }

// ============================================================================
// DATA LOADING & INITIALIZATION
// ============================================================================

    /**
     * Load branches from database and update all related UI components
     * Called on page load and after branch operations
     */
    function loadBrands() {
        return fetch('/admin/brands')
            .then(response => response.json())
            .then(data => {
                brandsData = data;
                updateBrandsList();
                updateNewBranchBrandSelect();
                populateAddAssetBrandSelect();
                populateEditAssetBrandSelect();
                populateEmployeeBrandSelects();
            })
            .catch(error => {
                console.error('Error loading brands:', error);
                alert('Failed to load brands. Please refresh the page.');
                return Promise.reject(error);
            });
    }

    function updateNewBranchBrandSelect() {
        const sel = document.getElementById('newBranchBrand');
        if (!sel) return;
        const prev = sel.value;
        sel.innerHTML = '<option value="">Select brand</option>';
        const sorted = [...brandsData].sort((a, b) => a.name.localeCompare(b.name));
        sorted.forEach(brand => {
            const option = document.createElement('option');
            option.value = String(brand.id);
            option.textContent = brand.name;
            sel.appendChild(option);
        });
        if (prev && Array.prototype.some.call(sel.options, function (opt) { return opt.value === prev; })) {
            sel.value = prev;
        }
    }

    function _fillBrandSelect(sel) {
        if (!sel) return;
        var prev = sel.value;
        sel.innerHTML = '<option value="">Select brand</option>';
        var sorted = [...brandsData].sort(function (a, b) { return a.name.localeCompare(b.name); });
        sorted.forEach(function (brand) {
            var option = document.createElement('option');
            option.value = String(brand.id);
            option.textContent = brand.name;
            sel.appendChild(option);
        });
        if (prev && Array.prototype.some.call(sel.options, function (opt) { return opt.value === prev; })) {
            sel.value = prev;
        }
    }

    function populateAddAssetBrandSelect() {
        _fillBrandSelect(document.getElementById('add_asset_brand'));
    }

    function populateEditAssetBrandSelect() {
        _fillBrandSelect(document.getElementById('edit_asset_brand'));
    }

    function populateEmployeeBrandSelects() {
        _fillBrandSelect(document.getElementById('userModalBrand'));
        _fillBrandSelect(document.getElementById('bulkUserModalBrand'));
    }

    function updateAddAssetRestaurantBranchDropdown(brandId) {
        var buildingSelect = document.getElementById('branch');
        if (!buildingSelect) return;
        buildingSelect.innerHTML = '<option value="">Select Branch</option>';
        if (!brandId) return;
        var sorted = branchesData.filter(function (b) { return String(b.brand_id) === String(brandId); })
            .sort(function (a, b) { return a.name.localeCompare(b.name); });
        sorted.forEach(function (building) {
            var option = document.createElement('option');
            option.value = building.name;
            option.textContent = building.name;
            buildingSelect.appendChild(option);
        });
    }

    function updateUserModalBranchesFromBrand(brandId, branchSelectId) {
        var buildingSelect = document.getElementById(branchSelectId);
        if (!buildingSelect) return;
        buildingSelect.innerHTML = '<option value="">Select branch</option>';
        if (!brandId) return;
        var sorted = branchesData.filter(function (b) { return String(b.brand_id) === String(brandId); })
            .sort(function (a, b) { return a.name.localeCompare(b.name); });
        sorted.forEach(function (building) {
            var option = document.createElement('option');
            option.value = String(building.id);
            option.textContent = building.name;
            buildingSelect.appendChild(option);
        });
    }

    function updateBrandsList() {
        const tbody = document.getElementById('brandsList');
        if (!tbody) return;
        tbody.innerHTML = '';
        const sorted = [...brandsData].sort((a, b) => a.name.localeCompare(b.name));
        if (sorted.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-4">No brands yet. Add one above.</td></tr>';
            refreshSettingsTableSearch('brandsList');
            return;
        }
        sorted.forEach((brand, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${i + 1}</td>
                <td><strong class="brand-name" data-id="${brand.id}">${brand.name}</strong></td>
                <td>
                    <div class="d-flex gap-2 flex-wrap align-items-center">
                        <button type="button" class="btn-app-edit-icon edit-brand-btn" data-id="${brand.id}" data-name="${brand.name}" title="Edit brand" aria-label="Edit brand">
                            <i class="bi bi-pencil-square" aria-hidden="true"></i>
                        </button>
                        <button type="button" class="btn-app-edit-icon btn-app-danger-icon delete-brand-btn" data-id="${brand.id}" data-name="${brand.name}" title="Delete brand" aria-label="Delete brand">
                            <i class="bi bi-trash" aria-hidden="true"></i>
                        </button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
        document.querySelectorAll('.edit-brand-btn').forEach(btn => {
            btn.addEventListener('click', handleEditBrand);
        });
        document.querySelectorAll('.delete-brand-btn').forEach(btn => {
            btn.addEventListener('click', handleDeleteBrand);
        });
        refreshSettingsTableSearch('brandsList');
    }

    function loadBranches() {
        return fetch('/admin/branches')
            .then(response => response.json())
            .then(data => {
                branchesData = data;
                updateBranchDropdown();
                updateBranchesList();
                updateDepartmentBranchDropdown();
            })
            .catch(error => {
                console.error('Error loading branches:', error);
                alert('Failed to load branches. Please refresh the page.');
            });
    }

    /**
     * Load departments from database and update all related UI components
     * Called on page load and after department operations
     */
    function loadDepartments() {
        fetch('/admin/departments')
            .then(response => response.json())
            .then(data => {
                departmentsData = data;
                updateDepartmentsList();
                updateDepartmentQRList();
                updateDepartmentFilterDropdown();
            })
            .catch(error => console.error('Error loading departments:', error));
    }

// ============================================================================
// BRANCH MANAGEMENT FUNCTIONS
// ============================================================================

    // Update branch dropdown options (add-asset modal; restaurant uses brand filter)
    function updateBranchDropdown() {
        const buildingSelect = document.getElementById('branch');
        if (!buildingSelect) return;
        if (getAddAssetVenue() === 'restaurant') {
            const bsel = document.getElementById('add_asset_brand');
            updateAddAssetRestaurantBranchDropdown(bsel && bsel.value ? bsel.value : '');
            return;
        }
        buildingSelect.innerHTML = '<option value="">Select Branch</option>';
        branchesData.forEach(building => {
            const option = document.createElement('option');
            option.value = building.name;
            option.textContent = building.name;
            buildingSelect.appendChild(option);
        });
    }

    // Update department branch dropdown in management modal
    function updateDepartmentBranchDropdown() {
        const select = document.getElementById('newDepartmentBranch');
        if (!select) return;
        select.innerHTML = '<option value="">Select Branch</option>';
        branchesData.forEach(building => {
            const option = document.createElement('option');
            option.value = building.id;
            option.textContent = building.name;
            select.appendChild(option);
        });
    }

    // Update branches list in management modal
    function updateBranchesList() {
        const branchesList = document.getElementById('branchesList');
        if (!branchesList) return;
        branchesList.innerHTML = '';
        resetMgmtTableBulkUI('selectAllBranchesCheckbox', 'bulkDeleteBranchesBtn', 'branchesList', 'branch-row-checkbox');

        const sorted = [...branchesData].sort((a, b) => a.name.localeCompare(b.name));
        if (sorted.length === 0) {
            branchesList.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No branches yet. Add one above.</td></tr>';
            refreshSettingsTableSearch('branchesList');
            return;
        }

        sorted.forEach((building, i) => {
            const brandLabel = building.brand_name ? building.brand_name : '—';
            const tr = document.createElement('tr');
            tr.innerHTML = `

    // Update departments list in management modal
    function updateDepartmentsList() {
        const departmentsList = document.getElementById('departmentsList');

        const selectedBuilding = filterSelect ? filterSelect.value : '';

        departmentsList.innerHTML = '';
        resetMgmtTableBulkUI('selectAllDepartmentsCheckbox', 'bulkDeleteDepartmentsBtn', 'departmentsList', 'department-row-checkbox');

        let filteredDepartments = departmentsData;
        if (selectedBuilding === '__office__') {
            filteredDepartments = departmentsData.filter(function (dept) {
                return dept.branch_id == null || dept.branch_name === OFFICE_BRANCH_LABEL_JS;
            });
        } else if (selectedBuilding) {
            filteredDepartments = departmentsData.filter(dept => dept.branch_name === selectedBuilding);

        if (filteredDepartments.length === 0) {
            departmentsList.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">No departments found</td></tr>';

        const sorted = [...filteredDepartments].sort((a, b) => {

            return a.name.localeCompare(b.name);

    // Handle viewing department QR code in large size
    function handleViewDepartmentQR(e) {
        const building = e.currentTarget.getAttribute('data-branch');
        const department = e.currentTarget.getAttribute('data-department');
        
        // Use the new department QR modal
        showDepartmentQRModal(building, department);

    // Handle printing department QR code
    function handlePrintDepartmentQR(e) {
        const building = e.currentTarget.getAttribute('data-branch');
        const department = e.currentTarget.getAttribute('data-department');
        if (!building || !department) return;
        var qs = 'preset=' + encodeURIComponent(QR_LABEL_PRESET)
            + '&branch=' + encodeURIComponent(building)
            + '&department=' + encodeURIComponent(department)
            + '&print=0&nocache=' + Date.now();
        window.open('/assets/qr-label-print/department?' + qs, '_blank', 'noopener');
    }

    // Handle bulk printing department QR codes
    function handlePrintDepartmentBulkQr() {
        if (departmentsData.length === 0) {
            alert('No department QR codes to print.');
            return;
        }
        if (departmentsData.length > 10) {
            alert('Maximum 10 departments can be printed at once. Please filter your departments or print in batches.');
            return;
        }
        var items = departmentsData.map(function (d) {
            return { kind: 'department', branch: d.branch_name, department: d.name };
        });
        fetchServerQrBatchPrint({
            preset: QR_LABEL_PRESET,
            autoprint: true,
            preview_outline: false,
            items: items
        }).catch(function (err) {
            alert(err.message || String(err));
        });
    }

    // Handle preview department bulk QR codes
    function handlePreviewDepartmentBulkQr() {
        if (departmentsData.length === 0) {
            alert('No department QR codes to preview.');
            return;
        }
        if (departmentsData.length > 10) {
            alert('Maximum 10 departments can be previewed at once. Please filter your departments or preview in batches.');
            return;
        }
        var items = departmentsData.map(function (d) {
            return { kind: 'department', branch: d.branch_name, department: d.name };
        });
        fetchServerQrBatchPrint({
            preset: QR_LABEL_PRESET,

            items: items
        }).catch(function (err) {

        });
    }

    // Handle exporting department QR codes to PDF
    function handleExportDepartmentQRPdf() {
        if (departmentsData.length === 0) {
            alert('No department QR codes to export.');
            return;
        }

        // Create PDF content
        let pdfContent = `
            <html>
            <head>
                <title>Department QR Codes</title>
                <style>
                    body { font-family: Arial, sans-serif; margin: 20px; }
                    .header { text-align: center; margin-bottom: 30px; }
                    .qr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
                    .qr-item { text-align: center; padding: 15px; border: 1px solid #ddd; }
                    .qr-code { margin-bottom: 10px; }
                    .qr-label { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
                    .qr-subtitle { font-size: 12px; color: #666; }
                    @media print {
                        .qr-grid { grid-template-columns: repeat(3, 1fr); }
                        .qr-item { page-break-inside: avoid; }
                    }
                </style>
            </head>
            <body>
                <div class="header">
                    <h1>Department QR Codes</h1>
                    <p>Generated on ${new Date().toLocaleDateString()}</p>
                </div>
                <div class="qr-grid">
        `;

        // Add each department QR code
        departmentsData.forEach(dept => {
            const departmentCode = `MAA-${dept.branch_name.replace(/\s+/g, '').toUpperCase()}-${dept.name.replace(/\s+/g, '').toUpperCase()}`;
            pdfContent += `
                <div class="qr-item">
                    <div class="qr-code">
                        <img src="/assets/department_qr/${encodeURIComponent(dept.branch_name)}/${encodeURIComponent(dept.name)}" 
                             alt="QR Code for ${dept.name}" 
                             style="width: 120px; height: 120px;">
                    </div>
                    <div class="qr-label">${departmentCode}</div>
                    <div class="qr-subtitle">${dept.name} - ${dept.branch_name}</div>
                </div>
            `;
        });

        pdfContent += `
                </div>
            </body>
            </html>
        `;

        // Create a new window for PDF generation
        const pdfWindow = window.open('', '_blank', 'width=800,height=600');
        pdfWindow.document.write(pdfContent);
        pdfWindow.document.close();
        
        // Wait for images to load, then print
        setTimeout(() => {
            pdfWindow.focus();
            pdfWindow.print();
            setTimeout(() => {
                pdfWindow.close();
            }, 1000);
        }, 1000);
    }

    (function bindBrandMgmt() {
        const addBrandBtn = document.getElementById('addBrandBtn');
        if (!addBrandBtn) return;
        addBrandBtn.addEventListener('click', function() {
            const nameInput = document.getElementById('newBrandName');
            const name = nameInput.value.trim();
            if (!name) {
                alert('Please enter a brand name.');
                return;
            }
            const formData = new FormData();
            formData.append('name', name);
            fetch('/admin/brands', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        nameInput.value = '';
                        loadBrands();
                    } else {
                        alert(data.error || 'Failed to add brand.');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Failed to add brand.');
                });
        });
    })();

    (function bindBranchMgmt() {
        const addBranchBtn = document.getElementById('addBranchBtn');
        if (!addBranchBtn) return;
        addBranchBtn.addEventListener('click', function() {
        const nameInput = document.getElementById('newBranchName');
        const brandSelect = document.getElementById('newBranchBrand');
        const name = nameInput.value.trim();
        const brandId = brandSelect ? brandSelect.value : '';

        if (!name) {
            mgmtShowError('Please enter a branch name.');

        if (!brandId) {
            mgmtShowError('Please select a brand for this branch.');
            return;
        }

        const formData = new FormData();
        formData.append('name', name);
        formData.append('brand_id', brandId);

        fetch('/admin/branches', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())

                nameInput.value = '';
                loadBranches();

                mgmtShowError(data.error || 'Failed to add branch.');

        .catch(error => {

            mgmtShowError('Failed to add branch.');
        });

        }

        updateSettingsNewAssetNameTypeDropdown();

        if (addAssetTypeSelect) {
            const prev = addAssetTypeSelect.value;
            addAssetTypeSelect.innerHTML = '<option value="">Select Asset Type</option>';
            typesMatchingAssetModalLocation(addVenue).forEach(function (assetType) {
                const option = document.createElement('option');
                option.value = String(assetType.id);
                option.textContent = assetType.label || assetType.name;
                addAssetTypeSelect.appendChild(option);
            });
            if (prev && Array.from(addAssetTypeSelect.options).some(function (o) { return o.value === prev; })) {
                addAssetTypeSelect.value = prev;
            }
        }

        const editVenue = getEditAssetVenue();
        const editAssetTypeSelect = document.getElementById('edit_asset_type');
        if (editAssetTypeSelect) {
            const prev = editAssetTypeSelect.value;
            editAssetTypeSelect.innerHTML = '<option value="">Select Asset Type</option>';
            typesMatchingAssetModalLocation(editVenue).forEach(function (assetType) {
                const option = document.createElement('option');
                option.value = String(assetType.id);
                option.textContent = assetType.label || assetType.name;
                editAssetTypeSelect.appendChild(option);
            });
            if (prev && Array.from(editAssetTypeSelect.options).some(function (o) { return o.value === prev; })) {
                editAssetTypeSelect.value = prev;
            }
        }

        const assetTypeFilterSelect = document.getElementById('assetTypeFilter');
        if (assetTypeFilterSelect) {
            assetTypeFilterSelect.innerHTML = '<option value="">All Types</option>';
            types.forEach(function (assetType) {
                const option = document.createElement('option');
                option.value = assetType.name;
                option.textContent = assetType.label || assetType.name;

        const input = document.getElementById(inputId);
        const datalistId = inputId === 'name' ? 'assetNameList' : 'editAssetNameList';
        const datalist = document.getElementById(datalistId);
        
        if (!input || !datalist) return;
        
        // Clear existing options
        datalist.innerHTML = '';
        
        const key = assetTypeId != null && assetTypeId !== '' ? String(assetTypeId) : '';
        if (!key || !window.assetNamesByTypeId || !window.assetNamesByTypeId[key]) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'No asset names available for this type';
            datalist.appendChild(option);
            return;
        }
        
        // Add all asset names for the selected type
        window.assetNamesByTypeId[key].forEach(assetName => {
            const option = document.createElement('option');
            option.value = assetName.name;
            option.textContent = assetName.name;
            datalist.appendChild(option);
        });
        
        // Set initial placeholder
        const totalOptions = window.assetNamesByTypeId[key].length;
        input.placeholder = `Type to search predefined names (${totalOptions} available)`;
        
        // Add event listener for real-time filtering
        input.addEventListener('input', function() {
            filterAssetNameOptions(assetTypeId, inputId);
        });
        
        // Add event listener for selection (only for add asset form)
        if (inputId === 'name') {
            input.addEventListener('change', function() {
                const selectedValue = this.value.trim();
                if (selectedValue && validateAssetName(assetTypeId, selectedValue)) {
                    addAssetNameToSelection(selectedValue);
                    this.value = '';
                }
            });
        }
    }

    // Filter asset name options based on user input
    function filterAssetNameOptions(assetTypeId, inputId) {
        const input = document.getElementById(inputId);
        const datalistId = inputId === 'name' ? 'assetNameList' : 'editAssetNameList';
        const datalist = document.getElementById(datalistId);
        
        const key = assetTypeId != null && assetTypeId !== '' ? String(assetTypeId) : '';
        if (!input || !datalist || !window.assetNamesByTypeId || !window.assetNamesByTypeId[key]) {
            return;
        }
        
        const userInput = input.value.toLowerCase().trim();
        
        // Clear existing options
        datalist.innerHTML = '';
        
        if (!userInput) {
            // If no input, show all asset names for the type
            window.assetNamesByTypeId[key].forEach(assetName => {
                const option = document.createElement('option');
                option.value = assetName.name;
                option.textContent = assetName.name;
                datalist.appendChild(option);
            });
            return;
        }
        
        // Filter asset names that start with the user input
        const filteredNames = window.assetNamesByTypeId[key].filter(assetName => 
            assetName.name.toLowerCase().startsWith(userInput)
        );
        
        // Add filtered options
        filteredNames.forEach(assetName => {
            const option = document.createElement('option');
            option.value = assetName.name;
            option.textContent = assetName.name;
            datalist.appendChild(option);
        });
        
        // If no matches found, show a message
        if (filteredNames.length === 0) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'No matching asset names found';
            datalist.appendChild(option);
        }
        
        // Update placeholder to show available options
        const totalOptions = window.assetNamesByTypeId[key].length;
        const availableOptions = filteredNames.length;
        if (userInput) {
            input.placeholder = `Found ${availableOptions} of ${totalOptions} asset names (type to filter)`;
        } else {
            input.placeholder = `Type to search predefined names (${totalOptions} available)`;
        }
    }

    // Validate asset name exists in predefined list
    function validateAssetName(assetTypeId, assetName) {
        const key = assetTypeId != null && assetTypeId !== '' ? String(assetTypeId) : '';
        if (!key || !assetName || !window.assetNamesByTypeId || !window.assetNamesByTypeId[key]) {
            return false;
        }
        
        const validNames = window.assetNamesByTypeId[key].map(item => item.name);
        return validNames.includes(assetName);
    }

    // Multi-select asset names functionality
    let selectedAssetNames = [];

    // Add asset name to selected list
    function addAssetNameToSelection(assetName) {
        if (!selectedAssetNames.includes(assetName)) {
            selectedAssetNames.push(assetName);
            updateSelectedAssetNamesDisplay();
            updateHiddenInput();
        }
    }

    // Remove asset name from selected list
    function removeAssetNameFromSelection(assetName) {
        const index = selectedAssetNames.indexOf(assetName);
        if (index > -1) {
            selectedAssetNames.splice(index, 1);
            updateSelectedAssetNamesDisplay();
            updateHiddenInput();
        }
    }

    // Update the display of selected asset names
    function updateSelectedAssetNamesDisplay() {
        const container = document.getElementById('selectedAssetNames');
        if (!container) return;
        
        container.innerHTML = '';
        
        selectedAssetNames.forEach(assetName => {
            const tag = document.createElement('div');
            tag.className = 'asset-name-tag';
            tag.innerHTML = `
                <span class="asset-name-text">${assetName}</span>
                <button type="button" class="tag-remove" aria-label="Remove ${assetName}" onclick="removeAssetNameFromSelection('${assetName.replace(/'/g, "\\'")}')">&times;</button>
            `;
            container.appendChild(tag);
        });
    }

    // Update hidden input with selected asset names
    function updateHiddenInput() {
        const hiddenInput = document.getElementById('selectedAssetNamesInput');
        if (hiddenInput) {
            hiddenInput.value = selectedAssetNames.join(',');
        }
    }

    // Clear selected asset names
    function clearSelectedAssetNames() {
        selectedAssetNames = [];
        updateSelectedAssetNamesDisplay();
        updateHiddenInput();
    }

    // Handle department change to update owner dropdown (add-asset form only)
    (function bindAddAssetDepartmentListeners() {
        const departmentEl = document.getElementById('department');
        const noOwnerCheckEl = document.getElementById('noOwnerCheck');
        const ownerSelectEl = document.getElementById('owner');
        if (!departmentEl || !noOwnerCheckEl || !ownerSelectEl) return;

        departmentEl.addEventListener('change', function() {
            loadOwnersForDepartment(this.value);
            checkNoOwnerOption();
        });

        noOwnerCheckEl.addEventListener('change', function() {
            if (noOwnerCheckEl.checked) {
                ownerSelectEl.disabled = true;
                ownerSelectEl.value = '';
                ownerSelectEl.style.opacity = '0.6';
                ownerSelectEl.style.backgroundColor = '#f8f9fa';
                ownerSelectEl.removeAttribute('required');
            } else {
                ownerSelectEl.disabled = false;
                ownerSelectEl.style.opacity = '1';
                ownerSelectEl.style.backgroundColor = '';
                ownerSelectEl.setAttribute('required', 'required');
                loadOwnersForDepartment(departmentEl.value);
            }
        });
    })();

    // Function to check if department should have no owner option
    function checkNoOwnerOption() {
        const departmentSelect = document.getElementById('department');
        const noOwnerCheck = document.getElementById('noOwnerCheck');
        const ownerSelect = document.getElementById('owner');
        if (!departmentSelect || !noOwnerCheck || !ownerSelect) return;
        
        const selectedDepartment = departmentSelect.value;
        
        if (selectedDepartment) {
            // Show the checkbox and enable it for all departments
            noOwnerCheck.parentElement.style.display = 'block';
            noOwnerCheck.disabled = false;
            
            // If checkbox is checked, keep owner disabled
            if (noOwnerCheck.checked) {
                ownerSelect.disabled = true;
                ownerSelect.style.opacity = '0.6';
                ownerSelect.style.backgroundColor = '#f8f9fa';
            }
        } else {
            // Hide the checkbox when no department is selected
            noOwnerCheck.parentElement.style.display = 'none';
            noOwnerCheck.checked = false;
            ownerSelect.disabled = false;
            ownerSelect.style.opacity = '1';
            ownerSelect.style.backgroundColor = '';
        }
    }

    /**
     * Dynamically load owners for a selected department
     * Updates the owner dropdown based on department selection
     * @param {string} departmentName - The selected department name
     */
    function loadOwnersForDepartment(departmentName) {
        const ownerSelect = document.getElementById('owner');
        if (!ownerSelect) return;

        // Clear existing options
        ownerSelect.innerHTML = '<option value="">Loading...</option>';
        
        if (!departmentName) {
            ownerSelect.innerHTML = '<option value="">Select department first</option>';
            return;
        }
        
        // Resolve department id (restaurant vs office) then load users
        const branchName = (document.getElementById('branch') && document.getElementById('branch').value) || '';
        const deptId = resolveDepartmentIdForOwnerLookup(departmentName, branchName);
        if (!deptId) {
            ownerSelect.innerHTML = '<option value="">Department not found</option>';
            return;
        }

        fetch('/admin/users?department_id=' + encodeURIComponent(deptId))
            .then(response => response.json())
            .then(users => {
                ownerSelect.innerHTML = '<option value="">Select Owner</option>';
                
                if (users.length === 0) {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = 'No users in this department';
                    option.disabled = true;
                    ownerSelect.appendChild(option);
                } else {
                    users.sort((a, b) => a.name.localeCompare(b.name)).forEach(user => {
                        const option = document.createElement('option');
                        option.value = user.name;
                        option.textContent = user.name;
                        ownerSelect.appendChild(option);
                    });
                }
            })
            .catch(error => {
                console.error('Error loading owners:', error);
                ownerSelect.innerHTML = '<option value="">Error loading owners</option>';
            });
    }

    // Load users for user modal
    function loadUserModalUsers(filterDepartmentId = '') {
        const url = filterDepartmentId ? `/admin/users?department_id=${filterDepartmentId}` : '/admin/users';
        
        fetch(url)
            .then(response => response.json())
            .then(users => {
                const usersList = document.getElementById('userModalList');
                if (!usersList) return;
                usersList.innerHTML = '';
                resetMgmtTableBulkUI('selectAllEmployeesRosterCheckbox', 'bulkDeleteEmployeesRosterBtn', 'userModalList', 'employee-roster-checkbox');

                if (users.length === 0) {
                    usersList.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No employees found.</td></tr>';
                    refreshSettingsTableSearch('userModalList');
                    return;
                }

                const sorted = [...users].sort((a, b) => {
                    const byBranch = (a.branch_name || '').localeCompare(b.branch_name || '');
                    if (byBranch !== 0) return byBranch;
                    const byDept = (a.department_name || '').localeCompare(b.department_name || '');
                    if (byDept !== 0) return byDept;
                    return (a.name || '').localeCompare(b.name || '');
                });

                sorted.forEach((user, i) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><input type="checkbox" class="employee-roster-checkbox" value="${user.id}" aria-label="Select ${user.name}"></td>
                        <td>${i + 1}</td>
                        <td><strong>${user.name}</strong></td>
                        <td>${user.branch_name}</td>
                        <td>${user.department_name}</td>
                        <td>
                            <div class="d-flex gap-2 flex-wrap align-items-center">
                                <button type="button" class="btn-app-edit-icon edit-employee-btn"
                                        data-id="${user.id}" data-name="${user.name}" data-department="${user.department_name}"
                                        data-department-id="${user.department_id}" data-branch="${user.branch_name || ''}"
                                        title="Edit employee" aria-label="Edit employee">
                                    <i class="bi bi-pencil-square" aria-hidden="true"></i>
                                </button>
                                <button type="button" class="btn-app-edit-icon btn-app-danger-icon delete-employee-btn"
                                        data-id="${user.id}" data-name="${user.name}" data-department="${user.department_name}"
                                        title="Delete employee" aria-label="Delete employee">
                                    <i class="bi bi-trash" aria-hidden="true"></i>
                                </button>
                            </div>
                        </td>
                    `;
                    usersList.appendChild(tr);
                });
                document.querySelectorAll('.edit-employee-btn').forEach(function (btn) {
                    btn.addEventListener('click', handleEditUserModal);
                });
                document.querySelectorAll('.delete-employee-btn').forEach(function (btn) {
                    btn.addEventListener('click', handleDeleteUserModal);
                });
                resetMgmtTableBulkUI('selectAllEmployeesRosterCheckbox', 'bulkDeleteEmployeesRosterBtn', 'userModalList', 'employee-roster-checkbox');
                refreshSettingsTableSearch('userModalList');

            .catch(error => {
                console.error('Error loading users for modal:', error);
            });

    // Handle adding user from modal
    function handleAddUserModal() {
        const venue = document.getElementById('employeeVenue') ? document.getElementById('employeeVenue').value : '';
        const brandId = document.getElementById('userModalBrand') ? document.getElementById('userModalBrand').value : '';
        const buildingId = document.getElementById('userModalBranch').value;
        const departmentId = document.getElementById('userModalDepartment').value;
        const name = document.getElementById('userModalName').value.trim();

        if (!venue) {
            mgmtShowError('Please choose Restaurant or Office.');
            return;
        }
        if (venue === 'restaurant') {
            if (!brandId) {
                mgmtShowError('Please select a brand.');
                return;
            }
            if (!buildingId) {
                mgmtShowError('Please select a branch.');
                return;
            }
        }

        if (!departmentId) {
            mgmtShowError('Please select a department.');
            return;
        }
        
        if (!name) {
            mgmtShowError('Please enter an employee name.');
            return;
        }
        
        fetch('/admin/users', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                name: name,
                department_id: parseInt(departmentId)
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.id) {
                document.getElementById('userModalName').value = '';
                if (document.getElementById('employeeVenue')) document.getElementById('employeeVenue').value = '';
                const ubm = document.getElementById('userModalBrand');
                if (ubm) ubm.value = '';
                document.getElementById('userModalBranch').value = '';
                document.getElementById('userModalDepartment').value = '';
                document.getElementById('userModalDepartment').innerHTML = '<option value="">Choose location first</option>';
                syncEmployeeRegisterVenue();
                loadUserModalUsers(); // Reload the users list
                refreshOwnersIfAddAssetForm();
                if (window.AppDialogs) AppDialogs.success('Employee "' + name + '" registered successfully!');
                else alert('Employee "' + name + '" registered successfully!');
            } else {
                mgmtShowError(data.error || 'Failed to register employee.');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            mgmtShowError('Failed to register employee.');
        });
    }

    // Handle editing user from modal
    function handleEditUserModal(e) {
        const btn = e.currentTarget;
        if (!window.MgmtEditModals) return;
        const departmentId = btn.getAttribute('data-department-id');
        const branchName = btn.getAttribute('data-branch') || '';
        const dept = departmentsData.find(function (d) { return String(d.id) === String(departmentId); });
        var branchId = dept && dept.branch_id != null ? dept.branch_id : null;
        var brandId = '';
        if (branchId) {
            var br = branchesData.find(function (b) { return b.id === branchId; });
            brandId = br ? br.brand_id : '';
        }
        window.MgmtEditModals.openEmployee({
            id: btn.getAttribute('data-id'),
            name: btn.getAttribute('data-name'),
            departmentId: departmentId,
            branchName: branchName,
            branchId: branchId,
            brandId: brandId,
            venue: branchName === OFFICE_BRANCH_LABEL_JS ? 'office' : 'restaurant'
        });
    }

    // Handle deleting user from modal
    function handleDeleteUserModal(e) {
        const userId = e.currentTarget.getAttribute('data-id');
        const userName = e.currentTarget.getAttribute('data-name');
        const departmentName = e.currentTarget.getAttribute('data-department');
        const runDelete = function () {
            fetch(`/admin/users/${userId}`, { method: 'DELETE' })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        var filter = document.getElementById('userModalFilterDepartment');
                        loadUserModalUsers(filter && filter.value ? filter.value : '');
                        refreshOwnersIfAddAssetForm();
                    } else if (window.AppDialogs) {
                        AppDialogs.error(data.error || 'Failed to delete employee.');
                    } else {
                        alert(data.error || 'Failed to delete employee.');
                    }
                })
                .catch(function () {
                    if (window.AppDialogs) AppDialogs.error('Failed to delete employee.');
                    else alert('Failed to delete employee.');
                });
        };
        if (window.AppDialogs) {
            AppDialogs.confirm({
                title: 'Delete employee',
                message: 'Are you sure you want to delete employee "' + userName + '" from "' + departmentName + '"?',
                confirmText: 'Delete',
                confirmClass: 'modal-confirm-btn-reject'
            }).then(function (ok) { if (ok) runDelete(); });
        } else if (confirm('Delete employee "' + userName + '"?')) {
            runDelete();
        }
    }

    // Handle bulk adding users from modal
    function handleAddBulkUsersModal() {
        const venue = document.getElementById('bulkEmployeeVenue') ? document.getElementById('bulkEmployeeVenue').value : '';
        const brandId = document.getElementById('bulkUserModalBrand') ? document.getElementById('bulkUserModalBrand').value : '';
        const buildingId = document.getElementById('bulkUserModalBranch').value;
        const departmentId = document.getElementById('bulkUserModalDepartment').value;
        const userNamesText = document.getElementById('bulkUserNames').value.trim();

        if (!venue) {
            alert('Please choose Restaurant or Office.');
            return;
        }
        if (venue === 'restaurant') {
            if (!brandId) {
                alert('Please select a brand.');
                return;
            }
            if (!buildingId) {
                alert('Please select a branch.');
                return;
            }
        }
        
        if (!departmentId) {
            alert('Please select a department.');
            return;
        }
        
        if (!userNamesText) {
            alert('Please enter employee names.');
            return;
        }
        
        // Split the text into individual names and filter out empty lines
        const userNames = userNamesText.split('\n')
            .map(name => name.trim())
            .filter(name => name.length > 0);
        
        if (userNames.length === 0) {
            alert('Please enter at least one valid employee name.');
            return;
        }
        
        // Show confirmation with count
        if (!confirm(`Add ${userNames.length} employee(s) to the selected department?\n\nEmployees to add:\n${userNames.join('\n')}`)) {
            return;
        }
        
        fetch('/admin/users/bulk', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                users: userNames,
                department_id: parseInt(departmentId)
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.added_users) {
                // Clear the form
                document.getElementById('bulkUserNames').value = '';
                if (document.getElementById('bulkEmployeeVenue')) document.getElementById('bulkEmployeeVenue').value = '';
                const bbm = document.getElementById('bulkUserModalBrand');

                document.getElementById('bulkUserModalBranch').value = '';
                document.getElementById('bulkUserModalDepartment').value = '';
                document.getElementById('bulkUserModalDepartment').innerHTML = '<option value="">Choose location first</option>';
                syncBulkEmployeeRegisterVenue();
                
                // Reload data
                loadUserModalUsers();
                refreshOwnersIfAddAssetForm();
                
                // Show results
                let message = `Successfully added ${data.total_added} employee(s)!`;
                if (data.total_errors > 0) {
                    message += `\n\n${data.total_errors} employee(s) could not be added:\n${data.errors.join('\n')}`;
                }
                alert(message);
            } else {
                alert(data.error || 'Failed to add employees.');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Failed to add employees.');
        });
    }

    /** Bulk action strip (matches dashboard .app-bulk-bar) for settings + modals that reuse mgmt partials */
    var SETTINGS_MGMT_BULK_META = {
        branchesList: { bulkBarId: 'settingsBranchesBulkBar', selectedCountId: 'settingsBranchesSelectedCount', clearBtnId: 'clearSettingsBranchesSelectionBtn' },
        departmentsList: { bulkBarId: 'settingsDepartmentsBulkBar', selectedCountId: 'settingsDepartmentsSelectedCount', clearBtnId: 'clearSettingsDepartmentsSelectionBtn' },
        userModalList: { bulkBarId: 'settingsEmployeesBulkBar', selectedCountId: 'settingsEmployeesSelectedCount', clearBtnId: 'clearSettingsEmployeesSelectionBtn' },
        assetTypesList: { bulkBarId: 'settingsAssetTypesBulkBar', selectedCountId: 'settingsAssetTypesSelectedCount', clearBtnId: 'clearSettingsAssetTypesSelectionBtn' },
        assetNamesList: { bulkBarId: 'settingsAssetNamesBulkBar', selectedCountId: 'settingsAssetNamesSelectedCount', clearBtnId: 'clearSettingsAssetNamesSelectionBtn' }
    };

    function hideSettingsMgmtBulkBar(tbodyId) {
        var meta = SETTINGS_MGMT_BULK_META[tbodyId];
        if (!meta) return;
        var bar = document.getElementById(meta.bulkBarId);
        var cnt = document.getElementById(meta.selectedCountId);
        if (bar) bar.style.display = 'none';
        if (cnt) cnt.textContent = '0';
    }

    function resetMgmtTableBulkUI(selectAllId, bulkBtnId, tbodyId, rowClass) {
        const tbody = document.getElementById(tbodyId);
        const selectAll = document.getElementById(selectAllId);
        const bulkBtn = document.getElementById(bulkBtnId);
        if (tbody) {
            tbody.querySelectorAll('.' + rowClass).forEach(function (cb) { cb.checked = false; });
        }
        if (selectAll) {
            selectAll.checked = false;
            selectAll.indeterminate = false;
        }
        if (bulkBtn) {
            bulkBtn.style.display = 'none';
        }
        hideSettingsMgmtBulkBar(tbodyId);
    }

    function setupMgmtBulkDeletes() {
        const configs = [
            {
                tbodyId: 'branchesList',
                selectAllId: 'selectAllBranchesCheckbox',
                rowClass: 'branch-row-checkbox',
                bulkBtnId: 'bulkDeleteBranchesBtn',
                deleteUrl: function (id) { return '/admin/branches/' + encodeURIComponent(id); },
                afterDelete: function () { loadBranches(); loadDepartments(); }
            },
            {
                tbodyId: 'departmentsList',
                selectAllId: 'selectAllDepartmentsCheckbox',
                rowClass: 'department-row-checkbox',
                bulkBtnId: 'bulkDeleteDepartmentsBtn',
                deleteUrl: function (id) { return '/admin/departments/' + encodeURIComponent(id); },
                afterDelete: function () { loadDepartments(); }
            },
            {
                tbodyId: 'userModalList',
                selectAllId: 'selectAllEmployeesRosterCheckbox',
                rowClass: 'employee-roster-checkbox',
                bulkBtnId: 'bulkDeleteEmployeesRosterBtn',
                deleteUrl: function (id) { return '/admin/users/' + encodeURIComponent(id); },
                afterDelete: function () {
                    const sel = document.getElementById('userModalFilterDepartment');
                    loadUserModalUsers(sel && sel.value ? sel.value : '');
                    refreshOwnersIfAddAssetForm();
                }
            },
            {
                tbodyId: 'assetTypesList',
                selectAllId: 'selectAllAssetTypesCheckbox',
                rowClass: 'asset-type-row-checkbox',
                bulkBtnId: 'bulkDeleteAssetTypesBtn',
                deleteUrl: function (id) { return '/admin/asset-types/' + encodeURIComponent(id); },
                afterDelete: function () {
                    loadAssetTypes();
                    loadAssetNames();
                    updateAssetNameDropdowns();
                }
            },
            {
                tbodyId: 'assetNamesList',
                selectAllId: 'selectAllAssetNamesCheckbox',
                rowClass: 'asset-name-row-checkbox',
                bulkBtnId: 'bulkDeleteAssetNamesBtn',
                deleteUrl: function (id) { return '/admin/asset-names/' + encodeURIComponent(id); },
                afterDelete: function () {
                    loadAssetNames();
                    updateAssetNameDropdowns();
                }
            }
        ];

        configs.forEach(function (t) {
            const meta = SETTINGS_MGMT_BULK_META[t.tbodyId] || {};
            const cfg = Object.assign({}, t, meta);
            const tbody = document.getElementById(cfg.tbodyId);
            const selectAll = document.getElementById(cfg.selectAllId);
            const bulkBtn = document.getElementById(cfg.bulkBtnId);
            if (!tbody || !selectAll || !bulkBtn) return;
            if (tbody.dataset.mgmtBulkBound === '1') return;
            tbody.dataset.mgmtBulkBound = '1';

            function rowBoxes() {
                return tbody.querySelectorAll('.' + cfg.rowClass);
            }

            function updateBulkBtn() {
                const n = tbody.querySelectorAll('.' + cfg.rowClass + ':checked').length;
                if (cfg.bulkBarId) {
                    const bar = document.getElementById(cfg.bulkBarId);
                    const cnt = cfg.selectedCountId && document.getElementById(cfg.selectedCountId);
                    if (bar) bar.style.display = n ? 'block' : 'none';
                    if (cnt) cnt.textContent = String(n);
                    bulkBtn.style.display = n ? 'inline-flex' : 'none';
                    if (n) {
                        bulkBtn.innerHTML = '<i class="bi bi-trash"></i> Delete Selected';
                    }
                } else {
                    bulkBtn.style.display = n ? 'inline-flex' : 'none';
                    bulkBtn.innerHTML = '<i class="bi bi-trash me-1"></i> Delete Selected (' + n + ')';
                }
            }

            function syncSelectAll() {
                const list = rowBoxes();
                if (!list.length) {
                    selectAll.checked = false;
                    selectAll.indeterminate = false;
                    return;
                }
                const checked = tbody.querySelectorAll('.' + cfg.rowClass + ':checked');
                selectAll.checked = checked.length === list.length;
                selectAll.indeterminate = checked.length > 0 && checked.length < list.length;
            }

            selectAll.addEventListener('change', function () {
                rowBoxes().forEach(function (cb) { cb.checked = selectAll.checked; });
                selectAll.indeterminate = false;
                updateBulkBtn();
            });

            tbody.addEventListener('change', function (e) {
                if (e.target.classList.contains(cfg.rowClass)) {
                    updateBulkBtn();
                    syncSelectAll();
                }
            });

            if (cfg.clearBtnId) {
                const clearBtn = document.getElementById(cfg.clearBtnId);
                if (clearBtn && clearBtn.dataset.mgmtBulkClearBound !== '1') {
                    clearBtn.dataset.mgmtBulkClearBound = '1';
                    clearBtn.addEventListener('click', function () {
                        rowBoxes().forEach(function (cb) { cb.checked = false; });
                        selectAll.checked = false;
                        selectAll.indeterminate = false;
                        updateBulkBtn();
                    });
                }
            }

            bulkBtn.addEventListener('click', function () {
                const checked = Array.prototype.slice.call(tbody.querySelectorAll('.' + cfg.rowClass + ':checked'));
                if (!checked.length) return;
                const runBulkDelete = function () {
                    Promise.all(checked.map(function (cb) {
                        return fetch(cfg.deleteUrl(cb.value), { method: 'DELETE' })
                            .then(function (r) {
                                return r.json().catch(function () { return {}; }).then(function (data) {
                                    if (!r.ok || data.success !== true) {
                                        return { error: data.error || 'Request failed' };
                                    }
                                    return {};
                                });
                            });
                    })).then(function (results) {
                        const errs = results.filter(function (x) { return x && x.error; });
                        if (errs.length) {
                            const msg = 'Some items could not be deleted:\n' + errs.map(function (e) { return e.error; }).join('\n');
                            if (window.AppDialogs) AppDialogs.error(msg);
                            else alert(msg);
                        }
                        selectAll.checked = false;
                        selectAll.indeterminate = false;
                        bulkBtn.style.display = 'none';
                        hideSettingsMgmtBulkBar(cfg.tbodyId);
                        cfg.afterDelete();
                    }).catch(function () {
                        if (window.AppDialogs) AppDialogs.error('Network error during bulk delete.');
                        else alert('Network error during bulk delete.');
                    });
                };
                if (window.AppDialogs) {
                    AppDialogs.confirm({
                        title: 'Delete selected',
                        message: 'Delete ' + checked.length + ' selected item(s)? This cannot be undone.',
                        confirmText: 'Delete',
                        confirmClass: 'modal-confirm-btn-reject'
                    }).then(function (ok) { if (ok) runBulkDelete(); });
                } else if (confirm('Delete ' + checked.length + ' selected item(s)?')) {
                    runBulkDelete();
                }
            });
        });
    }

    /** Server-rendered QR pages using DB-backed mm layouts (see /assets/api/qr-label-layout/...) */
    function fetchServerQrBatchPrint(payload) {
        return fetch('/assets/qr-label-print/batch', {
            method: 'POST',
            credentials: 'same-origin',
            cache: 'no-store',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(function (response) {
            return response.text().then(function (text) {
                if (!response.ok) {
                    var msg = text || 'Print request failed';
                    try {
                        var errObj = JSON.parse(text);
                        if (errObj && errObj.error) msg = errObj.error;
                    } catch (_ignore) { /* plain text body */ }
                    throw new Error(msg);
                }
                return text;
            });
        }).then(function (html) {
            // Blob navigation (not document.write on about:blank) -- Chromium reliably applies @page sizing
            // and absolute mm layout to the real print pipeline; document.write often matches screen only.
            var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            var url = URL.createObjectURL(blob);
            var w = window.open(url, '_blank', 'noopener');
            if (!w) {
                URL.revokeObjectURL(url);
                alert('Pop-up blocked. Allow pop-ups so the print view can open.');
                return;
            }
            w.addEventListener('beforeunload', function () {
                URL.revokeObjectURL(url);
            }, { once: true });
        });
    }

    function updateBulkActionsBar() {
        const bulkBar = document.getElementById('bulkActionsBar');

        if (!bulkBar || !selectedCount) return;

        if (selectedAssets.length > 0) {

    const ASSET_BULK_STORAGE_KEY = 'assetRegisterBulk_v1';

    function assetRegisterFilterKey() {
        const u = new URL(window.location.href);
        u.searchParams.delete('page');
        return u.pathname + '?' + u.searchParams.toString();
    }

    function persistAssetBulkSelection() {
        try {
            if (!selectedAssets.length) {
                sessionStorage.removeItem(ASSET_BULK_STORAGE_KEY);
                return;
            }
            sessionStorage.setItem(ASSET_BULK_STORAGE_KEY, JSON.stringify({
                filterKey: assetRegisterFilterKey(),
                assets: selectedAssets
            }));
        } catch (e) { /* ignore quota */ }
    }

    function tryRestoreAssetBulkSelection() {
        try {
            const raw = sessionStorage.getItem(ASSET_BULK_STORAGE_KEY);
            if (!raw) return;
            const obj = JSON.parse(raw);
            if (!obj || !Array.isArray(obj.assets) || obj.filterKey !== assetRegisterFilterKey()) {
                if (obj && obj.filterKey !== assetRegisterFilterKey()) {
                    sessionStorage.removeItem(ASSET_BULK_STORAGE_KEY);
                }
                return;
            }
            selectedAssets = obj.assets;
        } catch (e) {
            sessionStorage.removeItem(ASSET_BULK_STORAGE_KEY);
        }
    }

    function applyAssetCheckboxDomFromSelection() {
        const idSet = new Set(selectedAssets.map(function (a) { return String(a.id); }));
        document.querySelectorAll('.asset-checkbox').forEach(function (cb) {
            const aid = cb.getAttribute('data-asset-id');
            cb.checked = idSet.has(String(aid));
        });
    }

    function syncRegisterSelectAllVisual() {
        const meta = document.getElementById('registerMatchingTotal');
        const sac = document.getElementById('selectAllCheckbox');
        if (!sac) return;
        const total = meta ? parseInt(meta.getAttribute('data-total') || '0', 10) || 0 : 0;
        const n = selectedAssets.length;
        if (total === 0) {
            sac.checked = false;
            sac.indeterminate = false;
            return;
        }
        sac.checked = n > 0 && n === total;
        sac.indeterminate = n > 0 && n < total;
    }

    function fetchAllMatchingRegisterIds() {
        const u = new URL(window.location.href);
        u.searchParams.delete('page');
        return fetch('/assets/matching-register-ids?' + u.searchParams.toString())
            .then(function (r) {
                return r.json().then(function (data) {
                    return { ok: r.ok, data: data };
                });
            })
            .then(function (res) {
                if (!res.ok || !res.data || !Array.isArray(res.data.assets)) {
                    throw new Error((res.data && res.data.error) || 'Failed to load matching assets');
                }
                return res.data.assets;
            });
    }
